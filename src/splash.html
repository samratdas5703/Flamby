<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
    }

    .logo {
      width: 80vw;
      max-width: 600px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.2s;
    }

    .tagline {
      margin-top: 24px;
      font-size: 13px;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      opacity: 0;
      animation: fadeIn 1s ease forwards 1s;
    }

    .loader-bar {
      position: absolute;
      bottom: 40px;
      width: 160px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 1.2s;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f97316, #ef4444, #ec4899);
      border-radius: 2px;
      animation: loadFill 1.6s ease forwards 1.4s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes loadFill {
      to { width: 100%; }
    }
  </style>
</head>
<body>

  <img class="logo" src="Intro.png" alt="Flamby" />
  <div class="tagline">The Future</div>

  <div class="loader-bar">
    <div class="loader-fill"></div>
  </div>

</body>
</html>
