<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Flamby</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    /* ── Bookmark Popup (glass, matches Settings/Downloads panel) ── */
    .bookmark-popup {
      display: none;
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(20,16,35,0.55);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 22px;
      width: 320px;
      z-index: 99999;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .bookmark-popup.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .bookmark-popup h3 {
      color: #ffffff;
      font-size: 15px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .bookmark-popup input {
      width: 100%;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 10px 14px;
      color: #ffffff;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    .bookmark-popup input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .bookmark-popup input:focus {
      border-color: rgba(10,132,255,0.5);
      background: rgba(255,255,255,0.14);
    }
    .bookmark-popup-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .bookmark-popup-buttons button {
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
    }
    .btn-cancel {
      background: rgba(255,255,255,0.08);
      border: 0.5px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.75);
    }
    .btn-cancel:hover {
      background: rgba(255,255,255,0.16);
      color: #ffffff;
    }
    .btn-save {
      background: rgba(10,132,255,0.85);
      border: 0.5px solid rgba(255,255,255,0.2);
      color: #ffffff;
    }
    .btn-save:hover {
      background: rgba(10,132,255,1);
    }
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 99998;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .popup-overlay.show {
      display: block;
      opacity: 1;
    }

    /* ── First-launch onboarding ── */
    .onboarding-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999999;
      background: #0a0a0c;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
    }
    .onboarding-overlay.show { display: flex; }

    .onboarding-progress {
      display: flex;
      gap: 4px;
      width: 900px;
      max-width: 92vw;
      margin-bottom: 14px;
    }
    .onboarding-progress .seg {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }
    .onboarding-progress .seg .seg-fill {
      height: 100%;
      width: 0%;
      background: #4f8cff;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .onboarding-progress .seg.done .seg-fill { width: 100%; }
    .onboarding-progress .seg.active .seg-fill { width: 100%; }

    .onboarding-card {
      display: flex;
      width: 900px;
      max-width: 92vw;
      height: 560px;
      max-height: 82vh;
      border-radius: 18px;
      overflow: hidden;
      background: #17171a;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .onboarding-left {
      width: 380px;
      flex-shrink: 0;
      padding: 44px 38px;
      display: flex;
      flex-direction: column;
      background: #0e0e10;
    }
    .onboarding-text { flex: 1; }
    .onboarding-text h2 {
      font-size: 30px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
      margin-bottom: 18px;
    }
    .onboarding-text p {
      font-size: 13.5px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .onboarding-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .onboarding-btn-primary {
      width: 100%;
      padding: 12px 20px;
      background: #b7bfe6;
      border: none;
      border-radius: 8px;
      color: #201a3d;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .onboarding-btn-primary:hover { background: #c7cef0; }
    .onboarding-btn-skip {
      padding: 4px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 12.5px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .onboarding-btn-skip:hover { color: rgba(255,255,255,0.75); }

    .onboarding-right {
      flex: 1;
      padding: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      background: #1c1c1f;
    }

    /* Search-engine step grid */
    .onboarding-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 380px;
    }
    .onboarding-choice-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 22px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
    }
    .onboarding-choice-card:hover { background: rgba(255,255,255,0.08); }
    .onboarding-choice-card.active {
      background: rgba(79,140,255,0.15);
      border-color: rgba(79,140,255,0.5);
    }
    .onboarding-choice-card .icon-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Theme swatch grid re-use */
    .onboarding-theme-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      max-width: 380px;
    }
    .onboarding-theme-grid .theme-swatch { width: 42px; height: 42px; }

    /* Feature toggles step */
    .onboarding-toggles {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
    }
    .onboarding-toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .onboarding-toggle-row:last-child { border-bottom: none; }
    .onboarding-toggle-row .label { display: flex; flex-direction: column; gap: 3px; }
    .onboarding-toggle-row .label span:first-child { color: #ffffff; font-size: 13.5px; font-weight: 600; }
    .onboarding-toggle-row .label span:last-child { color: rgba(255,255,255,0.45); font-size: 11.5px; }

    /* Welcome / final step logo mark */
    .onboarding-final {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }
    .onboarding-final img {
      width: 128px;
      height: 128px;
      object-fit: contain;
      filter: drop-shadow(0 8px 28px rgba(0,0,0,0.5));
    }


    .download-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #0a84ff;
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      line-height: 1;
    }

    /* ── Downloads (lives inside settings-panel-style drawer) ── */
    .download-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .download-item:last-child { border-bottom: none; }
    .download-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(10,132,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .download-info { flex: 1; min-width: 0; }
    .download-name {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .download-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }
    .download-progress-track {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .download-progress-fill {
      height: 100%;
      background: rgba(10,132,255,0.85);
      border-radius: 2px;
      transition: width 0.2s ease;
    }
    .download-actions {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }
    .download-actions span {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.2s;
    }
    .download-actions span:hover { color: #5eb3ff; }
    .downloads-empty {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      text-align: center;
      padding: 30px 10px;
    }

    /* ── Update Notification ── */
    .update-toast {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 340px;
      background: rgba(22,18,38,0.97);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 18px;
      z-index: 999999;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
      color: white;
      animation: updateSlideIn 0.35s ease;
    }
    .update-toast.show { display: block; }
    @keyframes updateSlideIn {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .update-toast-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .update-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(10,132,255,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .update-toast-title {
      font-size: 14px;
      font-weight: 600;
    }
    .update-toast-version {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }
    .update-toast-close {
      margin-left: auto;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .update-toast-close:hover { color: white; }
    .update-notes {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      max-height: 130px;
      overflow-y: auto;
      margin-bottom: 14px;
      padding-right: 4px;
    }
    .update-notes::-webkit-scrollbar { width: 3px; }
    .update-notes::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }
    .update-notes ul { padding-left: 16px; margin: 4px 0; }
    .update-notes p { margin: 4px 0; }
    .update-toast-buttons {
      display: flex;
      gap: 8px;
    }
    .update-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .update-btn-primary {
      background: #0a84ff;
      color: white;
    }
    .update-btn-primary:hover { background: #0070e0; }
    .update-btn-secondary {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75);
    }
    .update-btn-secondary:hover { background: rgba(255,255,255,0.18); }
    .update-btn-primary:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .update-progress-track {
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .update-progress-fill {
      height: 100%;
      background: #0a84ff;
      border-radius: 3px;
      transition: width 0.2s ease;
      width: 0%;
    }
    .update-progress-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="browser-shell" id="browserShell">

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tabs" id="tabList"></div>
      <button class="new-tab-btn" onclick="addTab()">+</button>
      <div class="window-controls" id="windowControls" data-style="dots">
        <button class="win-btn minimize" onclick="window.electronAPI.minimize()"></button>
        <button class="win-btn maximize" onclick="window.electronAPI.maximize()"></button>
        <button class="win-btn close-btn" onclick="window.electronAPI.close()"></button>
      </div>
    </div>

    <div class="browser-body">

      <!-- Vertical Tab Rail -->
      <div class="tab-rail" id="tabRail">
        <div class="tab-rail-header">
          <button class="rail-collapse-btn" id="railCollapseBtn" onclick="toggleRailCollapse()" title="Collapse rail">‹</button>
          <button class="new-tab-btn-vertical" onclick="addTab()">
            <span>+</span><span class="label">&nbsp;New Tab</span>
          </button>
        </div>
        <div class="tabs-vertical" id="tabListVertical"></div>
      </div>

      <div class="browser-main">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="nav-btn" onclick="goBack()" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <button class="nav-btn" onclick="goForward()" title="Forward">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="nav-btn" onclick="reloadPage()" title="Reload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button class="nav-btn" onclick="goHome()" title="Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>

      <div class="address-wrapper">
        <span class="lock-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
        </span>
        <input
          class="address-bar"
          id="urlBar"
          type="text"
          placeholder="Search or enter URL..."
          onkeydown="if(event.key==='Enter') navigate()"
        />
        <button class="go-btn" onclick="navigate()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>

      <button
        class="nav-btn"
        id="bookmarkBtn"
        onclick="handleBookmarkClick()"
        title="Bookmark this page"
        style="color:rgba(255,255,255,0.5)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"><polygon points="12 2.5 15.1 9 22.2 9.9 17 14.8 18.3 21.9 12 18.4 5.7 21.9 7 14.8 1.8 9.9 8.9 9"/></svg>
      </button>

      <button
        class="nav-btn"
        id="downloadsBtn"
        onclick="toggleDownloads()"
        title="Downloads"
        style="color:rgba(255,255,255,0.5);position:relative">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="downloadBadge" class="download-badge" style="display:none">0</span>
      </button>

      <button class="nav-btn" onclick="toggleSettings()" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33h0A1.65 1.65 0 009 4.09V4a2 2 0 114 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>

      <button class="badge badge-toggle green" id="adblockBadge" onclick="toggleAdblock()" title="Ad blocker">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="6.5" y1="6.5" x2="17.5" y2="17.5"/></svg>
        <span id="adblockBadgeLabel">Ads</span>
      </button>
      <button class="badge badge-toggle purple" id="privateBadge" onclick="togglePrivateMode()" title="Private browsing">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
        <span id="privateBadgeLabel">Private</span>
      </button>
    </div>

    <!-- Bookmark Bar -->
    <div class="bookmark-bar" id="bookmarkBar">
      <span style="color:rgba(255,255,255,0.2);font-size:12px;padding:0 8px">
        No bookmarks yet — click the star to add one
      </span>
    </div>

    <!-- Webview Container -->
    <div class="webview-container" id="webviewContainer"></div>

    <!-- DevTools active indicator (F12) — the real DevTools window is
         repositioned by main.js to sit flush below this bar -->
    <div class="devtools-bar" id="devtoolsBar">
      <span class="devtools-bar-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        DevTools
      </span>
      <div style="display:flex;align-items:center;gap:4px;">
        <span style="font-size:10px;opacity:0.4">F12 to close</span>
        <button class="devtools-bar-close" onclick="closeDevtoolsPane()" title="Close">✕</button>
      </div>
    </div>

      </div> <!-- /.browser-main -->
    </div> <!-- /.browser-body -->

    <!-- Bookmark Popup Overlay -->
    <!-- Update Notification Toast -->
    <div class="update-toast" id="updateToast">
      <div class="update-toast-header">
        <div class="update-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </div>
        <div>
          <div class="update-toast-title" id="updateTitle">Update available</div>
          <div class="update-toast-version" id="updateVersionLabel"></div>
        </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════
    function displayUrl(url) {
      if (!url) return '';
      if (url.includes('newtab.html')) return '';
      return url;
    }

    let homepage        = 'newtab.html';
    let searchEngine    = 'google';
    let tabs            = [];
    let activeTab       = null;

    // ── Split view state ────────────────────────────────────
    // splitGroup: ordered array of tab ids currently shown side-by-side (max 4).
    // null/[] means no split — normal single-tab view.
    let splitGroup = [];
    let splitSizes = null; // { cols: [fr,fr,...], rows: [fr,fr,...] } — null = use even defaults
    let draggedTabId = null;
    let bookmarks       = [];
    let currentSettings = {};

    const engines = {
      google:     'https://www.google.com/search?q=',
      bing:       'https://www.bing.com/search?q=',
      duckduckgo: 'https://duckduckgo.com/?q=',
    };

    // ═══════════════════════════════════════════════════════
    // BOOKMARKS
    // ═══════════════════════════════════════════════════════

    async function loadBookmarks() {
      try {
        const saved = await window.electronAPI.getBookmarks();
        bookmarks = Array.isArray(saved) ? saved : [];
        renderBookmarkBar();
        renderBookmarkList();
      } catch (e) {
        console.error('Failed to load bookmarks:', e);
        bookmarks = [];
      }
    }

    async function saveAllBookmarks() {
      try {
        await window.electronAPI.saveBookmarks(bookmarks);
      } catch (e) {
        console.error('Failed to save bookmarks:', e);
      }
    }

    // Opens the bookmark popup
    function handleBookmarkClick() {
      const url = document.getElementById('urlBar').value.trim();

      // If already bookmarked, remove it immediately
      const existingIndex = bookmarks.findIndex(b => b.url === url);
      if (existingIndex !== -1) {
        bookmarks.splice(existingIndex, 1);
        saveAllBookmarks();
        renderBookmarkBar();
        renderBookmarkList();
        updateStar(url);
        return;
      }

      // Not bookmarked — show the popup
      document.getElementById('bookmarkNameInput').value = document.title || url;
      document.getElementById('bookmarkUrlInput').value  = url;
      document.getElementById('bookmarkPopup').classList.add('show');
      document.getElementById('popupOverlay').classList.add('show');
      document.getElementById('bookmarkNameInput').focus();
      document.getElementById('bookmarkNameInput').select();
    }

    function closeBookmarkPopup() {
      document.getElementById('bookmarkPopup').classList.remove('show');
      document.getElementById('popupOverlay').classList.remove('show');
    }

    async function saveBookmarkFromPopup() {
      const name = document.getElementById('bookmarkNameInput').value.trim();
      const url  = document.getElementById('bookmarkUrlInput').value.trim();

      if (!name || !url) return;

      bookmarks.push({
        name: name,
        url: url,
        dateAdded: new Date().toISOString()
      });

      await saveAllBookmarks();
      renderBookmarkBar();
      renderBookmarkList();
      updateStar(url);
      closeBookmarkPopup();
    }

    // Save bookmark when user presses Enter in the popup
    document.addEventListener('keydown', function(e) {
      const popup = document.getElementById('bookmarkPopup');
      if (popup.classList.contains('show') && e.key === 'Enter') {
        saveBookmarkFromPopup();
      }
      if (popup.classList.contains('show') && e.key === 'Escape') {
        closeBookmarkPopup();
      }
    });

    async function removeBookmark(index) {
      bookmarks.splice(index, 1);
      await saveAllBookmarks();
      renderBookmarkBar();
      renderBookmarkList();
      const url = document.getElementById('urlBar').value;
      updateStar(url);
    }

    // ── Shortcut Popup ──
let pendingShortcutWebview = null;

function openShortcutPopup(url, defaultName, webview) {
  pendingShortcutWebview = webview;
  document.getElementById('shortcutNameInput').value = defaultName || url;
  document.getElementById('shortcutUrlInput').value = url;
  document.getElementById('shortcutPopup').classList.add('show');
  document.getElementById('shortcutPopupOverlay').classList.add('show');
  document.getElementById('shortcutNameInput').focus();
  document.getElementById('shortcutNameInput').select();
}

function closeShortcutPopup() {
  document.getElementById('shortcutPopup').classList.remove('show');
  document.getElementById('shortcutPopupOverlay').classList.remove('show');
  pendingShortcutWebview = null;
}

function saveShortcutFromPopup() {
  const name = document.getElementById('shortcutNameInput').value.trim();
  const url = document.getElementById('shortcutUrlInput').value.trim();
  if (!name || !url) return;

  // Send the name and URL back to the webview
  if (pendingShortcutWebview) {
    pendingShortcutWebview.executeJavaScript(`
      // Call the original addShortcut with the new name and URL
      if (typeof window._originalAddShortcut === 'function') {
        window._originalAddShortcut('${name.replace(/'/g, "\\'")}', '${url.replace(/'/g, "\\'")}');
      } else {
        console.warn('Original addShortcut not found.');
      }
    `);
  }

  closeShortcutPopup();
}

    function updateStar(url) {
      const btn = document.getElementById('bookmarkBtn');
      if (!btn) return;
      const isBookmarked = bookmarks.some(b => b.url === url);
      const fill = isBookmarked ? 'currentColor' : 'none';
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"><polygon points="12 2.5 15.1 9 22.2 9.9 17 14.8 18.3 21.9 12 18.4 5.7 21.9 7 14.8 1.8 9.9 8.9 9"/></svg>`;
      btn.style.color = isBookmarked ? '#f5a623' : 'rgba(255,255,255,0.5)';
    }

    function getDomain(url) {
      try { return new URL(url).hostname; }
      catch (e) { return ''; }
    }

    function renderBookmarkBar() {
      const bar = document.getElementById('bookmarkBar');
      if (!bar) return;

      if (bookmarks.length === 0) {
        bar.innerHTML = `<span style="color:rgba(255,255,255,0.2);font-size:12px;padding:0 8px">No bookmarks yet — click the star to add one</span>`;
        return;
      }

      bar.innerHTML = bookmarks.map((b, i) => `
        <span class="bookmark-item" onclick="loadUrl('${b.url.replace(/'/g, "\\'")}')">
          <img
            src="https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=16"
            width="14" height="14"
            style="border-radius:2px;flex-shrink:0;margin-right:4px"
            onerror="this.style.display='none'"
          />${b.name}
          <button class="bm-remove"
                  onclick="event.stopPropagation();removeBookmark(${i})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></button>
        </span>
      `).join('');
    }

    function renderBookmarkList() {
      const el = document.getElementById('bookmarkList');
      if (!el) return;

      if (bookmarks.length === 0) {
        el.innerHTML = `<p style="color:rgba(255,255,255,0.4);font-size:13px">No bookmarks yet</p>`;
        return;
      }

      el.innerHTML = bookmarks.map((b, i) => `
        <div class="bm-list-item">
          <img
            src="https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=16"
            width="14" height="14"
            style="border-radius:2px;flex-shrink:0"
            onerror="this.style.display='none'"
          />
          <span onclick="loadUrl('${b.url.replace(/'/g, "\\'")}');toggleSettings()"
                style="flex:1;cursor:pointer;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${b.name}
          </span>
          <button onclick="removeBookmark(${i})"
                  style="background:none;border:none;color:rgba(255,100,100,0.6);cursor:pointer;font-size:12px;padding:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></button>
        </div>
      `).join('');
    }

    // ═══════════════════════════════════════════════════════
    // TABS
    // ═══════════════════════════════════════════════════════

    function addTab(url) {
      url = url || homepage;
      const id  = 'tab-' + Date.now();
      const isPrivate = !!currentSettings.privateModeEnabled;
      const tab = { id, url, title: 'New Tab', private: isPrivate };
      tabs.push(tab);
      createWebview(tab);

      if (splitGroup.length) {
        // Don't disturb an active split — the new tab opens in the background.
        // It'll only take over the view if the user clicks it or drags it
        // into/out of the split themselves.
        renderTabs();
      } else {
        switchTab(id);
        renderTabs();
      }
    }

function createWebview(tab) {
  const wv = document.createElement('webview');
  wv.id = 'wv-' + tab.id;
  wv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none';
  wv.setAttribute('partition', tab.private ? 'private-' + tab.id : 'persist:main');

  // ── Listen for the guest page asking us to open the shortcut popup ──
  // Note: this is Electron's real <webview> event, fired when the guest
  // calls ipcRenderer.sendToHost() from webview-preload.js. ('page-message'
  // is not an Electron webview event and never fires — that was the bug.)
  wv.addEventListener('ipc-message', (event) => {
    if (event.channel === 'open-shortcut-popup') {
      const [url, defaultName] = event.args;
      openShortcutPopup(url, defaultName, wv);
    }
  });

  // ── Inject override on dom-ready ──
  wv.addEventListener('dom-ready', () => {
    wv.executeJavaScript(`
      (function() {
        // Keep a reference to the page's own addShortcut (newtab.html
        // defines one) so the popup's Save button can call straight back
        // into it with the name/url already filled in, skipping prompt().
        if (typeof window.addShortcut === 'function' && !window._originalAddShortcut) {
          window._originalAddShortcut = window.addShortcut;
        }
        window.addShortcut = function() {
          const url = window.location.href;
          const defaultName = document.title || url;
          if (typeof window.__flambySendToHost === 'function') {
            window.__flambySendToHost('open-shortcut-popup', url, defaultName);
          } else if (typeof window._originalAddShortcut === 'function') {
            // Preload bridge unavailable for some reason — fall back rather
            // than silently doing nothing.
            window._originalAddShortcut();
          }
        };
      })();
    `);
    // Auto-attach a right-click "Picture in Picture" menu item on any
    // <video> on the page. The click happens inside the guest page
    // itself, so it's a real user gesture and requestPictureInPicture()
    // never fails with the "Must be handling a user gesture" error —
    // unlike driving PiP from the host via executeJavaScript, which
    // Chromium doesn't always count as one.
    wv.executeJavaScript(FLAMBY_PIP_INJECT_SCRIPT).catch(() => {});
  });

  // ── Navigation events ──
  wv.addEventListener('did-navigate', e => {
    tab.url = e.url;
    if (activeTab === tab.id) {
      document.getElementById('urlBar').value = displayUrl(e.url);
      updateStar(e.url);
    }
  });

  wv.addEventListener('did-navigate-in-page', e => {
    tab.url = e.url;
    if (activeTab === tab.id) {
      document.getElementById('urlBar').value = displayUrl(e.url);
      updateStar(e.url);
    }
  });

  wv.addEventListener('page-title-updated', e => {
    tab.title = e.title || 'New Tab';
    renderTabs();
  });

  // ── Set src AFTER attaching listeners ──
  wv.src = tab.url;
  document.getElementById('webviewContainer').appendChild(wv);
}

    function switchTab(id) {
      activeTab = id;
      if (splitGroup.length) {
        // In split view, clicking a tab that's already in the split just
        // focuses it (for toolbar/url-bar purposes) without leaving split mode.
        if (splitGroup.includes(id)) {
          renderSplitFocus();
          renderTabs();
          return;
        }
        // Switching to a tab outside the split exits split view entirely.
        exitSplitView();
      }
      document.querySelectorAll('#webviewContainer webview').forEach(wv => {
        wv.style.display = 'none';
      });
      const wv = document.getElementById('wv-' + id);
      if (wv) {
        wv.style.display = 'flex';
        const tab = tabs.find(t => t.id === id);
        if (tab) {
          document.getElementById('urlBar').value = displayUrl(tab.url || '');
          updateStar(tab.url || '');
        }
      }
      renderTabs();
    }

    function closeTab(id, e) {
      e.stopPropagation();
      const index = tabs.findIndex(t => t.id === id);
      tabs = tabs.filter(t => t.id !== id);
      const wv = document.getElementById('wv-' + id);
      if (wv) wv.remove();

      if (splitGroup.includes(id)) {
        splitGroup = splitGroup.filter(tid => tid !== id);
        splitSizes = null;
        if (splitGroup.length < 2) {
          exitSplitView(splitGroup[0] || (tabs[0] && tabs[0].id));
        } else {
          renderSplitView();
        }
      }

      if (tabs.length === 0) { addTab(); return; }
      if (activeTab === id && !splitGroup.length) {
        const newIndex = Math.min(index, tabs.length - 1);
        switchTab(tabs[newIndex].id);
      }
      renderTabs();
    }

    function renderTabs() {
      const list = document.getElementById('tabList');
      list.innerHTML = tabs.map(t => `
        <div class="tab ${t.id === activeTab ? 'active' : ''} ${splitGroup.includes(t.id) ? 'in-split' : ''}"
             draggable="true"
             ondragstart="handleTabDragStart(event, '${t.id}')"
             ondragover="handleTabDragOver(event, '${t.id}')"
             ondragleave="handleTabDragLeave(event)"
             ondrop="handleTabDrop(event, '${t.id}')"
             ondragend="handleTabDragEnd(event)"
             onclick="switchTab('${t.id}')">
          <span class="tab-title">${t.title}</span>
          <button class="tab-close" onclick="closeTab('${t.id}', event)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></button>
        </div>`).join('');

      const rail = document.getElementById('tabListVertical');
      if (rail) {
        rail.innerHTML = tabs.map(t => `
          <div class="tab-vertical ${t.id === activeTab ? 'active' : ''} ${splitGroup.includes(t.id) ? 'in-split' : ''}"
               draggable="true"
               ondragstart="handleTabDragStart(event, '${t.id}')"
               ondragover="handleTabDragOver(event, '${t.id}')"
               ondragleave="handleTabDragLeave(event)"
               ondrop="handleTabDrop(event, '${t.id}')"
               ondragend="handleTabDragEnd(event)"
               onclick="switchTab('${t.id}')"
               title="${(t.title || '').replace(/"/g, '&quot;')}">
            <span class="tab-vertical-dot"></span>
            <span class="tab-vertical-title">${t.title}</span>
            <button class="tab-vertical-close" onclick="closeTab('${t.id}', event)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></button>
          </div>`).join('');
      }

      if (splitGroup.length) updateSplitPaneLabels();
    }

    // ═══════════════════════════════════════════════════════
    // DRAG & DROP — reorder tabs, or drop-onto-tab to split
    // ═══════════════════════════════════════════════════════

    // A drop in the middle ~50% of a tab means "split with this tab";
    // a drop near either edge means "reorder — place it here instead".
    function getDropZone(e) {
      const el = e.currentTarget;
      const rect = el.getBoundingClientRect();
      const vertical = el.classList.contains('tab-vertical');
      const pos = vertical ? e.clientY - rect.top : e.clientX - rect.left;
      const size = vertical ? rect.height : rect.width;
      const ratio = size > 0 ? pos / size : 0.5;
      if (ratio < 0.25) return 'before';
      if (ratio > 0.75) return 'after';
      return 'split';
    }

    function handleTabDragStart(e, id) {
      draggedTabId = id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    }

    function handleTabDragOver(e, overId) {
      if (!draggedTabId || draggedTabId === overId) return;
      e.preventDefault();
      const el = e.currentTarget;
      const zone = getDropZone(e);
      el.classList.remove('drop-target-split', 'drop-target-before', 'drop-target-after');
      el.classList.add('drop-target-' + zone);
    }

    function handleTabDragLeave(e) {
      e.currentTarget.classList.remove('drop-target-split', 'drop-target-before', 'drop-target-after');
    }

    function handleTabDragEnd(e) {
      document.querySelectorAll('.drop-target-split, .drop-target-before, .drop-target-after')
        .forEach(el => el.classList.remove('drop-target-split', 'drop-target-before', 'drop-target-after'));
      draggedTabId = null;
    }

    function handleTabDrop(e, targetId) {
      e.preventDefault();
      const zone = getDropZone(e);
      e.currentTarget.classList.remove('drop-target-split', 'drop-target-before', 'drop-target-after');
      const sourceId = draggedTabId;
      draggedTabId = null;
      if (!sourceId || sourceId === targetId) return;

      // Drop it on the middle of another tab to split with it; drop it
      // near an edge to just reorder past it — no modifier key needed.
      if (zone === 'split') {
        splitWithTab(sourceId, targetId);
      } else {
        reorderTab(sourceId, targetId);
      }
    }

    function reorderTab(sourceId, targetId) {
      const fromIndex = tabs.findIndex(t => t.id === sourceId);
      const toIndex = tabs.findIndex(t => t.id === targetId);
      if (fromIndex === -1 || toIndex === -1) return;
      const [moved] = tabs.splice(fromIndex, 1);
      tabs.splice(toIndex, 0, moved);
      renderTabs();
    }

    // ═══════════════════════════════════════════════════════
    // SPLIT VIEW — up to 4 tabs side by side
    // ═══════════════════════════════════════════════════════

    function splitWithTab(sourceId, targetId) {
      if (!splitGroup.length) {
        // Starting a fresh split with exactly these two tabs.
        splitGroup = [targetId, sourceId];
      } else if (splitGroup.includes(targetId) && !splitGroup.includes(sourceId)) {
        // Adding a third/fourth tab onto an existing split pane.
        if (splitGroup.length >= 4) {
          showToast('Split view supports up to 4 tabs');
          return;
        }
        splitGroup.push(sourceId);
      } else if (!splitGroup.includes(sourceId) && !splitGroup.includes(targetId)) {
        splitGroup = [targetId, sourceId];
      } else {
        return; // both already in split, or nothing meaningful to do
      }
      splitSizes = null; // pane count changed — fall back to even sizing
      activeTab = sourceId;
      renderSplitView();
      renderTabs();
    }

    function exitSplitView(focusId) {
      const keepId = focusId || activeTab || splitGroup[0];
      const container = document.getElementById('webviewContainer');

      // Move every webview back out of its pane wrapper directly into the container
      document.querySelectorAll('.split-pane webview').forEach(wv => {
        wv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none';
        container.appendChild(wv);
      });
      document.querySelectorAll('.split-pane').forEach(el => el.remove());

      splitGroup = [];
      splitSizes = null;
      container.classList.remove('split-active');
      delete container.dataset.splitCount;
      container.style.gridTemplateColumns = '';
      container.style.gridTemplateRows = '';
      if (keepId) switchTab(keepId);
    }

    function defaultSplitSizes(count) {
      if (count === 2) return { cols: [1, 1], rows: [1] };
      return { cols: [1, 1], rows: [1, 1] }; // 3 (pane 3 spans full row) or 4 (2x2)
    }

    function splitGridTemplate(count) {
      const sizes = splitSizes || defaultSplitSizes(count);
      return {
        cols: sizes.cols.map(f => `${f}fr`).join(' '),
        rows: sizes.rows.map(f => `${f}fr`).join(' ')
      };
    }

    function renderSplitView() {
      const container = document.getElementById('webviewContainer');

      // If the pane structure already matches splitGroup, don't touch the DOM
      // at all — reparenting a live <webview> breaks its painted contents,
      // so we only rebuild when the actual set/order of split tabs changes.
      const existingPaneIds = Array.from(container.querySelectorAll('.split-pane'))
        .map(p => p.dataset.tabId);
      const alreadyCorrect = existingPaneIds.length === splitGroup.length &&
        existingPaneIds.every((id, i) => id === splitGroup[i]);
      if (alreadyCorrect) {
        updateSplitPaneLabels();
        return;
      }

      container.classList.add('split-active');
      container.dataset.splitCount = String(splitGroup.length);

      const { cols, rows } = splitGridTemplate(splitGroup.length);
      container.style.gridTemplateColumns = cols;
      container.style.gridTemplateRows = rows;

      // Tear down old pane wrappers/resizers, but keep webviews around to reuse.
      document.querySelectorAll('.split-pane webview').forEach(wv => container.appendChild(wv));
      document.querySelectorAll('.split-pane, .split-resizer').forEach(el => el.remove());

      // Any tab not in the split stays hidden as a loose child of the container.
      tabs.forEach(t => {
        const wv = document.getElementById('wv-' + t.id);
        if (wv && !splitGroup.includes(t.id)) wv.style.display = 'none';
      });

      splitGroup.forEach((id, order) => {
        const tab = tabs.find(t => t.id === id);
        const wv = document.getElementById('wv-' + id);
        if (!tab || !wv) return;

        const pane = document.createElement('div');
        pane.className = 'split-pane';
        pane.dataset.tabId = id;
        if (splitGroup.length === 3 && order === 2) {
          pane.style.gridColumn = '1 / span 2';
        }

        const header = document.createElement('div');
        header.className = 'split-pane-header' + (id === activeTab ? ' active' : '');
        header.innerHTML = `
          <span class="split-pane-title">${tab.title || 'New Tab'}</span>
          <button class="split-pane-close" title="Remove from split"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></button>
        `;
        header.addEventListener('click', (e) => {
          if (e.target.closest('.split-pane-close')) return;
          activeTab = id;
          renderSplitFocus();
          renderTabs();
        });
        header.querySelector('.split-pane-close').addEventListener('click', (e) => {
          e.stopPropagation();
          splitGroup = splitGroup.filter(tid => tid !== id);
          splitSizes = null;
          if (splitGroup.length < 2) {
            exitSplitView(splitGroup[0] || id);
          } else {
            renderSplitView();
          }
          renderTabs();
        });

        const body = document.createElement('div');
        body.className = 'split-pane-body';
        wv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:flex';
        body.appendChild(wv);

        pane.appendChild(header);
        pane.appendChild(body);
        container.appendChild(pane);

        // Reparenting a <webview> can leave its compositor thinking it still
        // has the old size/visibility, so force a hard re-layout: toggling
        // display off/on is a reliable way to make Chromium's compositor
        // actually repaint the guest page at its new size.
        requestAnimationFrame(() => {
          wv.style.display = 'none';
          requestAnimationFrame(() => {
            wv.style.display = 'flex';
            window.dispatchEvent(new Event('resize'));
          });
        });
      });

      attachSplitResizers(container, splitGroup.length);
    }

    // ── Drag-to-resize handles between split panes ─────────────
    function attachSplitResizers(container, count) {
      const sizes = splitSizes || defaultSplitSizes(count);

      // Vertical resizer (drag left/right) between column 1 and 2 —
      // present for 2, 3, or 4 panes since they all have a 2-column layout.
      const vResizer = document.createElement('div');
      vResizer.className = 'split-resizer split-resizer-v';
      positionResizer(vResizer, 'col', sizes);
      container.appendChild(vResizer);
      makeResizerDraggable(vResizer, container, 'col', sizes);

      // Horizontal resizer (drag up/down) between row 1 and 2 —
      // only present for 3 or 4 panes (2-row layouts).
      if (count >= 3) {
        const hResizer = document.createElement('div');
        hResizer.className = 'split-resizer split-resizer-h';
        positionResizer(hResizer, 'row', sizes);
        container.appendChild(hResizer);
        makeResizerDraggable(hResizer, container, 'row', sizes);
      }
    }

    // Places a resizer handle at the boundary implied by the current fr ratio,
    // since that boundary moves once the user has dragged away from 50/50.
    function positionResizer(handle, axis, sizes) {
      const values = axis === 'col' ? sizes.cols : sizes.rows;
      const ratio = values[0] / (values[0] + values[1]); // 0..1
      const pct = ratio * 100;
      if (axis === 'col') {
        handle.style.left = `${pct}%`;
      } else {
        handle.style.top = `${pct}%`;
      }
    }

    function makeResizerDraggable(handle, container, axis, sizes) {
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const rect = container.getBoundingClientRect();
        const startPos = axis === 'col' ? e.clientX : e.clientY;
        const totalSize = axis === 'col' ? rect.width : rect.height;
        const startSizes = axis === 'col' ? [...sizes.cols] : [...sizes.rows];
        const totalFr = startSizes.reduce((a, b) => a + b, 0);

        // <webview> is its own native surface — while the cursor is over
        // one, the page's mousemove listener stops receiving events,
        // which is what makes a resize feel like it's lagging/sticking.
        // A transparent overlay above everything keeps the drag on the
        // document instead of letting the webviews intercept it.
        const overlay = document.createElement('div');
        overlay.className = 'split-resize-overlay';
        overlay.style.cursor = axis === 'col' ? 'col-resize' : 'row-resize';
        container.appendChild(overlay);

        document.body.style.cursor = axis === 'col' ? 'col-resize' : 'row-resize';
        document.body.style.userSelect = 'none';

        let pendingSizes = startSizes;
        let rafId = null;

        function onMouseMove(e) {
          const currentPos = axis === 'col' ? e.clientX : e.clientY;
          const deltaPx = currentPos - startPos;
          const deltaFr = (deltaPx / totalSize) * totalFr;

          let first = startSizes[0] + deltaFr;
          let second = startSizes[1] - deltaFr;

          const minFr = totalFr * 0.15;
          if (first < minFr) { second -= (minFr - first); first = minFr; }
          if (second < minFr) { first -= (minFr - second); second = minFr; }

          pendingSizes = [first, second];

          // Only move the handle line live (cheap, pure CSS). Resizing the
          // actual grid/webviews on every single mousemove is the other
          // half of the lag — each one forces an expensive native resize
          // of the webview's own process — so that's deferred to mouseup.
          if (rafId) return;
          rafId = requestAnimationFrame(() => {
            rafId = null;
            const tempSizes = {
              cols: axis === 'col' ? pendingSizes : sizes.cols,
              rows: axis === 'row' ? pendingSizes : sizes.rows
            };
            positionResizer(handle, axis, tempSizes);
          });
        }

        function onMouseUp() {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          overlay.remove();
          document.body.style.cursor = '';
          document.body.style.userSelect = '';

          // Commit the real layout once, at the end of the drag — this is
          // the one moment the webviews actually get resized.
          splitSizes = splitSizes || defaultSplitSizes(splitGroup.length);
          if (axis === 'col') splitSizes.cols = pendingSizes;
          else splitSizes.rows = pendingSizes;

          const { cols, rows } = splitGridTemplate(splitGroup.length);
          container.style.gridTemplateColumns = cols;
          container.style.gridTemplateRows = rows;
          positionResizer(handle, axis, splitSizes);

          document.querySelectorAll('.split-pane webview').forEach(wv => {
            wv.style.display = 'none';
            requestAnimationFrame(() => { wv.style.display = 'flex'; });
          });
          window.dispatchEvent(new Event('resize'));
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
    }

    // Cheap, non-destructive: just refresh titles/active-state text on
    // existing pane headers without touching any webview's DOM position.
    function updateSplitPaneLabels() {
      document.querySelectorAll('.split-pane').forEach(pane => {
        const id = pane.dataset.tabId;
        const tab = tabs.find(t => t.id === id);
        const header = pane.querySelector('.split-pane-header');
        if (!tab || !header) return;
        header.classList.toggle('active', id === activeTab);
        const titleEl = header.querySelector('.split-pane-title');
        if (titleEl) titleEl.textContent = tab.title || 'New Tab';
      });
    }

    function renderSplitFocus() {
      const tab = tabs.find(t => t.id === activeTab);
      if (tab) {
        document.getElementById('urlBar').value = displayUrl(tab.url || '');
        updateStar(tab.url || '');
      }
      document.querySelectorAll('.split-pane-header').forEach(h => h.classList.remove('active'));
      renderSplitView();
    }

    // ═══════════════════════════════════════════════════════
    // VERTICAL TABS LAYOUT
    // ═══════════════════════════════════════════════════════

    function applyTabLayout(layout) {
      const shell = document.getElementById('browserShell');
      if (!shell) return;
      shell.classList.toggle('vertical-tabs', layout === 'vertical');
      const checkbox = document.getElementById('verticalTabsToggle');
      if (checkbox) checkbox.checked = (layout === 'vertical');
    }

    async function toggleTabLayout() {
      const checkbox = document.getElementById('verticalTabsToggle');
      const next = checkbox && checkbox.checked ? 'vertical' : 'horizontal';
      applyTabLayout(next);
      currentSettings.tabLayout = next;
      await saveSettings();
    }

    function toggleRailCollapse() {
      const rail = document.getElementById('tabRail');
      const btn  = document.getElementById('railCollapseBtn');
      if (!rail) return;
      const collapsed = rail.classList.toggle('collapsed');
      if (btn) btn.textContent = collapsed ? '›' : '‹';
      currentSettings.railCollapsed = collapsed;
      saveSettings();
    }

    // ═══════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════

    function getActiveWebview() {
      return document.getElementById('wv-' + activeTab);
    }

    function navigate() {
      let url = document.getElementById('urlBar').value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = url.includes('.') && !url.includes(' ')
          ? 'https://' + url
          : engines[searchEngine] + encodeURIComponent(url);
      }
      const wv = getActiveWebview();
      if (wv) wv.src = url;
    }

    function loadUrl(url) {
      const wv = getActiveWebview();
      if (wv) {
        wv.src = url;
        document.getElementById('urlBar').value = displayUrl(url);
        updateStar(url);
      }
    }

    function goBack()    { const wv = getActiveWebview(); if (wv) wv.goBack(); }
    function goForward() { const wv = getActiveWebview(); if (wv) wv.goForward(); }
    function reloadPage(){ const wv = getActiveWebview(); if (wv) wv.reload(); }
    function goHome()    { loadUrl(homepage); }

    // ═══════════════════════════════════════════════════════
    // SETTINGS
    // ═══════════════════════════════════════════════════════

    function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');

// ── Apply theme to the UI ──────────────────────────────────
function applyTheme(theme) {
  const themes = {
    dark:   'linear-gradient(135deg, #2b1055, #4d1d75, #1a3a6b)',
    light:  'linear-gradient(135deg, #a8c8ff, #c9b6f5, #f5c6e0)',
    purple: 'linear-gradient(135deg, #1a0a2e, #3d1466, #1a0a2e)',
    ocean:  'linear-gradient(135deg, #001e3c, #003e5c, #001e3c)',
    brown:  'linear-gradient(135deg, #3e2723, #5d4037, #4e342e)',
    gray:   'linear-gradient(135deg, #4a4a4a, #6b6b6b, #3d3d3d)',
    white:  'linear-gradient(135deg, #f5f5f7, #e8e8ec, #fafafa)',
    black:  'linear-gradient(135deg, #050505, #1a1a1a, #000000)',
    red:    'linear-gradient(135deg, #4a0e0e, #7a1f1f, #2e0707)',
    green:  'linear-gradient(135deg, #0d2818, #1e4d33, #0a1f12)',
    pink:   'linear-gradient(135deg, #d68fb0, #f0b8d0, #e89dc0)',
  };

  // Themes whose gradient is bright enough to need dark text instead of white
  const lightTextThemes = ['light', 'white', 'pink'];

  const gradient = themes[theme] || themes.dark;
  document.body.setAttribute('data-theme', lightTextThemes.includes(theme) ? 'light' : 'dark');
  document.body.style.background = gradient;
  document.querySelector('.browser-shell').style.background = gradient;

  // Update active swatch
  document.querySelectorAll('.theme-swatch').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('theme-' + theme);
  if (btn) btn.classList.add('active');
}

// ── Apply a custom user-picked theme color ──────────────────
function applyCustomTheme(hex) {
  const gradient = `linear-gradient(135deg, ${hex}, ${hex}99, ${hex}66)`;
  document.body.setAttribute('data-theme', isLightHex(hex) ? 'light' : 'dark');
  document.body.style.background = gradient;
  document.querySelector('.browser-shell').style.background = gradient;
  document.querySelectorAll('.theme-swatch').forEach(b => b.classList.remove('active'));
  const custom = document.querySelector('.theme-swatch-custom');
  if (custom) {
    custom.classList.add('active');
    custom.style.background = hex;
  }
}

function isLightHex(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}

async function setCustomTheme(hex) {
  applyCustomTheme(hex);
  currentSettings.theme = 'custom';
  currentSettings.customThemeColor = hex;
  await saveSettings();
}

// Small inline SVG icon helpers shared between the live titlebar
// and the settings preview swatches.
function wcIconMin(stroke) {
  stroke = stroke || 'currentColor';
  return `<svg viewBox="0 0 10 10" width="10" height="10"><line x1="1.5" y1="5" x2="8.5" y2="5" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round"/></svg>`;
}
function wcIconMax(stroke) {
  stroke = stroke || 'currentColor';
  return `<svg viewBox="0 0 10 10" width="9" height="9"><rect x="1.5" y="1.5" width="7" height="7" fill="none" stroke="${stroke}" stroke-width="1.1"/></svg>`;
}
function wcIconClose(stroke) {
  stroke = stroke || 'currentColor';
  return `<svg viewBox="0 0 10 10" width="10" height="10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round"/></svg>`;
}

const WC_STYLE_LABELS = { dots: 'Dots', windows: 'Windows', macos: 'macOS', minimal: 'Minimal' };

// Builds the markup for a given window-control style.
// interactive=true wires up the real minimize/maximize/close handlers
// (used for the live titlebar); interactive=false renders an inert
// preview swatch (used inside Settings).
function windowControlsMarkup(style, interactive) {
  const min   = interactive ? `onclick="window.electronAPI.minimize()"` : '';
  const max   = interactive ? `onclick="window.electronAPI.maximize()"` : '';
  const close = interactive ? `onclick="window.electronAPI.close()"`    : '';

  if (style === 'windows') {
    return `
      <button class="win-btn-sq wc-min" ${min} title="Minimize">${wcIconMin()}</button>
      <button class="win-btn-sq wc-max" ${max} title="Maximize">${wcIconMax()}</button>
      <button class="win-btn-sq wc-close" ${close} title="Close">${wcIconClose()}</button>`;
  }
  if (style === 'macos') {
    return `
      <button class="win-btn mac-btn mac-min" ${min} title="Minimize">${wcIconMin('rgba(0,0,0,0.6)')}</button>
      <button class="win-btn mac-btn mac-max" ${max} title="Maximize">${wcIconMax('rgba(0,0,0,0.6)')}</button>
      <button class="win-btn mac-btn mac-close" ${close} title="Close">${wcIconClose('rgba(0,0,0,0.6)')}</button>`;
  }
  if (style === 'minimal') {
    return `
      <button class="win-btn-flat" ${min} title="Minimize">${wcIconMin()}</button>
      <button class="win-btn-flat" ${max} title="Maximize">${wcIconMax()}</button>
      <button class="win-btn-flat wc-flat-close" ${close} title="Close">${wcIconClose()}</button>`;
  }
  // default: 'dots' — the original plain traffic-light style
  return `
    <button class="win-btn minimize" ${min}></button>
    <button class="win-btn maximize" ${max}></button>
    <button class="win-btn close-btn" ${close}></button>`;
}

// Renders the real titlebar buttons in the chosen style and marks the
// matching option active in Settings.
function applyWindowControlStyle(style) {
  if (!WC_STYLE_LABELS[style]) style = 'dots';
  const container = document.getElementById('windowControls');
  if (container) {
    container.dataset.style = style;
    container.innerHTML = windowControlsMarkup(style, true);
  }
  document.querySelectorAll('.wc-style-option').forEach(b => b.classList.remove('active'));
  const opt = document.getElementById('wc-opt-' + style);
  if (opt) opt.classList.add('active');
}

// ── Picture in Picture ────────────────────────────────────
// Instead of driving requestPictureInPicture() from the host process
// (which only works the first time, because Chromium requires an actual
// user gesture *inside the guest page* and executeJavaScript from the
// host doesn't reliably carry one across calls), we inject a script into
// every page that intercepts right-clicks on <video> elements — even
// under sites' own custom context menus (e.g. YouTube's) — and shows a
// small "Picture in Picture" menu item instead. Clicking it fires
// requestPictureInPicture() from inside the page itself, so it's always
// a genuine user gesture and works every time, on any site.
const FLAMBY_PIP_INJECT_SCRIPT = `
(function () {
  if (window.__flambyPipInstalled) return;
  window.__flambyPipInstalled = true;
  if (!document.pictureInPictureEnabled) return;

  let menu = null;
  function closeMenu() {
    if (menu) { menu.remove(); menu = null; }
  }

  function showMenu(video, x, y) {
    closeMenu();
    menu = document.createElement('div');
    menu.style.cssText = [
      'position:fixed', 'top:' + y + 'px', 'left:' + x + 'px',
      'background:#282828', 'color:#fff', 'font-family:Roboto,Arial,sans-serif',
      'font-size:13px', 'border-radius:8px', 'padding:6px 0',
      'box-shadow:0 4px 16px rgba(0,0,0,0.5)', 'z-index:2147483647',
      'min-width:180px', 'user-select:none'
    ].join(';');

    const item = document.createElement('div');
    const isPip = document.pictureInPictureElement === video;
    item.textContent = isPip ? 'Exit Picture in Picture' : 'Picture in Picture';
    item.style.cssText = 'padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;';
    item.onmouseenter = () => item.style.background = 'rgba(255,255,255,0.1)';
    item.onmouseleave = () => item.style.background = 'transparent';
    item.onclick = async (e) => {
      e.preventDefault();
      e.stopPropagation();
      closeMenu();
      try {
        if (document.pictureInPictureElement === video) {
          await document.exitPictureInPicture();
        } else {
          await video.requestPictureInPicture();
        }
      } catch (err) { /* ignore */ }
    };
    menu.appendChild(item);
    document.body.appendChild(menu);

    // Keep menu on-screen
    const r = menu.getBoundingClientRect();
    if (r.right > window.innerWidth) menu.style.left = (window.innerWidth - r.width - 4) + 'px';
    if (r.bottom > window.innerHeight) menu.style.top = (window.innerHeight - r.height - 4) + 'px';
  }

  function findVideoAt(x, y) {
    return Array.from(document.querySelectorAll('video')).find(v => {
      if (v.disablePictureInPicture) return false;
      const r = v.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom &&
             r.width > 0 && r.height > 0;
    });
  }

  document.addEventListener('contextmenu', (e) => {
    const video = findVideoAt(e.clientX, e.clientY);
    if (!video) return;
    // Intercept before the page's own context menu (e.g. YouTube's custom
    // right-click menu) can render, so ours shows instead.
    e.preventDefault();
    e.stopImmediatePropagation();
    showMenu(video, e.clientX, e.clientY);
  }, true);

  document.addEventListener('click', (e) => {
    if (menu && !menu.contains(e.target)) closeMenu();
  }, true);
  document.addEventListener('scroll', closeMenu, true);
  window.addEventListener('blur', closeMenu);
})();
`;

async function togglePiP() {
  const wv = getActiveWebview();
  if (!wv) { showToast('No active tab'); return; }
  try {
    const result = await wv.executeJavaScript(`
      (function() {
        if (document.pictureInPictureElement) {
          document.exitPictureInPicture();
          return '__pip_closed__';
        }
        const v = Array.from(document.querySelectorAll('video')).find(v => !v.paused) ||
                  document.querySelector('video');
        if (!v) return '__no_video__';
        return '__hover_hint__';
      })();
    `, true);
    if (result === '__no_video__') showToast('No video playing on this page');
    else if (result === '__hover_hint__') showToast('Right-click the video and choose Picture in Picture');
    else if (result === '__pip_closed__') showToast('Picture in Picture — off');
  } catch (err) {
    showToast('Could not activate Picture in Picture');
  }
}

// Alt+P keyboard shortcut for PiP
document.addEventListener('keydown', (e) => {
  if (e.altKey && (e.key === 'p' || e.key === 'P')) {
    e.preventDefault();
    togglePiP();
  }
});

    homepage     = saved.homepage     || 'https://google.com';

    document.querySelectorAll('.search-btn').forEach(b => b.classList.remove('active'));
    const searchBtn = document.getElementById('search-' + searchEngine);
    if (searchBtn) searchBtn.classList.add('active');

    // Apply bookmark bar visibility
    const bookmarkBarToggle = document.getElementById('bookmarkBarToggle');
    if (bookmarkBarToggle) {
      bookmarkBarToggle.checked = saved.showBookmarkBar !== false;
      document.getElementById('bookmarkBar').style.display =
        saved.showBookmarkBar !== false ? 'flex' : 'none';
    }

    // Apply Adblock toggle (defaults to ON)
    const adblockOn = saved.adblockEnabled !== false;
    const adblockCheckbox = document.getElementById('adblockToggle');
    if (adblockCheckbox) adblockCheckbox.checked = adblockOn;
    setAdblockUI(adblockOn);

    // Apply Private mode toggle (defaults to OFF)
    const privateOn = !!saved.privateModeEnabled;
    const privateCheckbox = document.getElementById('privateToggle');
    if (privateCheckbox) privateCheckbox.checked = privateOn;
    setPrivateUI(privateOn);

  } catch (e) {
    currentSettings = {
  homepage: 'https://google.com',
  searchEngine: 'google',
  theme: 'dark',
  showBookmarkBar: true,
  windowControlStyle: 'dots'
};
  applyWindowControlStyle('dots');
  }
  renderWindowControlPreviews();
}

function showToast(message) {
  // Remove existing toast if any
  const existing = document.getElementById('toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,30,50,0.95);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 999999;
    transition: opacity 0.3s;
  `;
  document.body.appendChild(toast);

  // Auto remove after 2.5 seconds
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

    // ═══════════════════════════════════════════════════════
    // DOWNLOADS
    // ═══════════════════════════════════════════════════════

    let downloadsCache = [];

    function toggleDownloads() {
      const panel = document.getElementById('downloadsPanel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) refreshDownloadsList();
    }

    function formatBytes(bytes) {
      if (!bytes || bytes <= 0) return '0 KB';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      let n = bytes;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function fileExt(filename) {
      const parts = (filename || '').split('.');
      return parts.length > 1 ? parts.pop().toUpperCase() : 'FILE';
    }

    function renderDownloads(list) {
      downloadsCache = list || [];
      const container = document.getElementById('downloadsList');
      const badge = document.getElementById('downloadBadge');

      const activeCount = downloadsCache.filter(d => d.state === 'progressing').length;
      if (activeCount > 0) {
        badge.style.display = 'flex';
        badge.textContent = activeCount;
      } else {
        badge.style.display = 'none';
      }

      if (!downloadsCache.length) {
        container.innerHTML = '<div class="downloads-empty">No downloads yet</div>';
        return;
      }

      container.innerHTML = downloadsCache.map(d => {
        const pct = d.totalBytes > 0 ? Math.min(100, Math.round((d.receivedBytes / d.totalBytes) * 100)) : 0;
        const isDone = d.state === 'completed';
        const isActive = d.state === 'progressing';
        const sizeLine = isActive
          ? `${formatBytes(d.receivedBytes)} of ${d.totalBytes > 0 ? formatBytes(d.totalBytes) : '?'}`
          : (isDone ? formatBytes(d.receivedBytes || d.totalBytes) : d.state);
        const safePath = d.savePath.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

        return `
          <div class="download-item">
            <div class="download-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <div class="download-info">
              <div class="download-name" title="${d.filename}">${d.filename}</div>
              <div class="download-meta">${sizeLine}</div>
              ${isActive ? `
                <div class="download-progress-track">
                  <div class="download-progress-fill" style="width:${pct}%"></div>
                </div>
              ` : ''}
              <div class="download-actions">
                ${isDone ? `
                  <span onclick="openDownloadItem('${safePath}')">Open</span>
                  <span onclick="showDownloadInFolder('${safePath}')">Show in folder</span>
                ` : ''}
                <span onclick="removeDownloadItem('${d.id}')">Remove</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function refreshDownloadsList() {
      const list = await window.electronAPI.getDownloads();
      renderDownloads(list);
    }

    async function clearDownloadsList() {
      const list = await window.electronAPI.clearDownloads();
      renderDownloads(list);
    }

    async function removeDownloadItem(id) {
      const list = await window.electronAPI.removeDownload(id);
