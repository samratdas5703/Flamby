<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Flamby</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    /* ── Bookmark Popup ── */
    .bookmark-popup {
      display: none;
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 20px;
      width: 320px;
      z-index: 99999;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .bookmark-popup.show {
      display: block;
    }
    .bookmark-popup h3 {
      color: white;
      font-size: 15px;
      margin-bottom: 14px;
      font-weight: 600;
    }
    .bookmark-popup input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 12px;
      color: white;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .bookmark-popup input:focus {
      border-color: rgba(10,132,255,0.6);
    }
    .bookmark-popup-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .bookmark-popup-buttons button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
    }
    .btn-cancel:hover {
      background: rgba(255,255,255,0.14);
    }
    .btn-save {
      background: #0a84ff;
      color: white;
    }
    .btn-save:hover {
      background: #0070e0;
    }
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 99998;
    }
    .popup-overlay.show {
      display: block;
    }

    /* ── Download badge ── */
    .download-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #0a84ff;
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      line-height: 1;
    }

    /* ── Downloads (lives inside settings-panel-style drawer) ── */
    .download-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .download-item:last-child { border-bottom: none; }
    .download-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(10,132,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .download-info { flex: 1; min-width: 0; }
    .download-name {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .download-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }
    .download-progress-track {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .download-progress-fill {
      height: 100%;
      background: rgba(10,132,255,0.85);
      border-radius: 2px;
      transition: width 0.2s ease;
    }
    .download-actions {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }
    .download-actions span {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.2s;
    }
    .download-actions span:hover { color: #5eb3ff; }
    .downloads-empty {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      text-align: center;
      padding: 30px 10px;
    }

    /* ── Update Notification ── */
    .update-toast {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 340px;
      background: rgba(22,18,38,0.97);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 18px;
      z-index: 999999;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
      color: white;
      animation: updateSlideIn 0.35s ease;
    }
    .update-toast.show { display: block; }
    @keyframes updateSlideIn {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .update-toast-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .update-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(10,132,255,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .update-toast-title {
      font-size: 14px;
      font-weight: 600;
    }
    .update-toast-version {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }
    .update-toast-close {
      margin-left: auto;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 13px;
      padding: 4px;
      flex-shrink: 0;
    }
    .update-toast-close:hover { color: white; }
    .update-notes {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      max-height: 130px;
      overflow-y: auto;
      margin-bottom: 14px;
      padding-right: 4px;
    }
    .update-notes::-webkit-scrollbar { width: 3px; }
    .update-notes::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }
    .update-notes ul { padding-left: 16px; margin: 4px 0; }
    .update-notes p { margin: 4px 0; }
    .update-toast-buttons {
      display: flex;
      gap: 8px;
    }
    .update-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .update-btn-primary {
      background: #0a84ff;
      color: white;
    }
    .update-btn-primary:hover { background: #0070e0; }
    .update-btn-secondary {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75);
    }
    .update-btn-secondary:hover { background: rgba(255,255,255,0.18); }
    .update-btn-primary:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .update-progress-track {
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .update-progress-fill {
      height: 100%;
      background: #0a84ff;
      border-radius: 3px;
      transition: width 0.2s ease;
      width: 0%;
    }
    .update-progress-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="browser-shell" id="browserShell">

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tabs" id="tabList"></div>
      <button class="new-tab-btn" onclick="addTab()">+</button>
      <div class="window-controls">
        <button class="win-btn minimize" onclick="window.electronAPI.minimize()"></button>
        <button class="win-btn maximize" onclick="window.electronAPI.maximize()"></button>
        <button class="win-btn close-btn" onclick="window.electronAPI.close()"></button>
      </div>
    </div>

    <div class="browser-body">

      <!-- Vertical Tab Rail -->
      <div class="tab-rail" id="tabRail">
        <div class="tab-rail-header">
          <button class="rail-collapse-btn" id="railCollapseBtn" onclick="toggleRailCollapse()" title="Collapse rail">‹</button>
          <button class="new-tab-btn-vertical" onclick="addTab()">
            <span>+</span><span class="label">&nbsp;New Tab</span>
          </button>
        </div>
        <div class="tabs-vertical" id="tabListVertical"></div>
      </div>

      <div class="browser-main">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="nav-btn" onclick="goBack()" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <button class="nav-btn" onclick="goForward()" title="Forward">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="nav-btn" onclick="reloadPage()" title="Reload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button class="nav-btn" onclick="goHome()" title="Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>

      <div class="address-wrapper">
        <span class="lock-icon">🔒</span>
        <input
          class="address-bar"
          id="urlBar"
          type="text"
          placeholder="Search or enter URL..."
          onkeydown="if(event.key==='Enter') navigate()"
        />
        <button class="go-btn" onclick="navigate()">→</button>
      </div>

      <button
        class="nav-btn"
        id="bookmarkBtn"
        onclick="handleBookmarkClick()"
        title="Bookmark this page"
        style="font-size:18px;color:rgba(255,255,255,0.5)">☆</button>

      <button
        class="nav-btn"
        id="downloadsBtn"
        onclick="toggleDownloads()"
        title="Downloads"
        style="font-size:16px;color:rgba(255,255,255,0.5);position:relative">
        ⬇️<span id="downloadBadge" class="download-badge" style="display:none">0</span>
      </button>

      

      <button class="nav-btn" onclick="toggleSettings()" title="Settings">⚙️</button>
      <span class="badge green">🚫 Ads</span>
      <span class="badge blue">🔒 Private</span>
    </div>

    <!-- Bookmark Bar -->
    <div class="bookmark-bar" id="bookmarkBar">
      <span style="color:rgba(255,255,255,0.2);font-size:12px;padding:0 8px">
        No bookmarks yet — click ☆ to add one
      </span>
    </div>

    <!-- Webview Container -->
    <div class="webview-container" id="webviewContainer"></div>

      </div> <!-- /.browser-main -->
    </div> <!-- /.browser-body -->

    <!-- Bookmark Popup Overlay -->
    <!-- Update Notification Toast -->
    <div class="update-toast" id="updateToast">
      <div class="update-toast-header">
        <div class="update-icon">⬆️</div>
        <div>
          <div class="update-toast-title" id="updateTitle">Update available</div>
          <div class="update-toast-version" id="updateVersionLabel"></div>
        </div>
        <button class="update-toast-close" onclick="dismissUpdateToast()">✕</button>
      </div>

      <div class="update-notes" id="updateNotes"></div>

      <div class="update-progress-track" id="updateProgressTrack" style="display:none">
        <div class="update-progress-fill" id="updateProgressFill"></div>
      </div>
      <div class="update-progress-label" id="updateProgressLabel" style="display:none"></div>

      <div class="update-toast-buttons" id="updateButtons">
        <button class="update-btn update-btn-secondary" onclick="dismissUpdateToast()">Later</button>
        <button class="update-btn update-btn-primary" id="updateActionBtn" onclick="handleUpdateAction()">Update now</button>
      </div>
    </div>

    <div class="popup-overlay" id="popupOverlay" onclick="closeBookmarkPopup()"></div>

    <!-- Bookmark Popup -->
    <div class="bookmark-popup" id="bookmarkPopup">
      <h3>⭐ Add Bookmark</h3>
      <input
        type="text"
        id="bookmarkNameInput"
        placeholder="Bookmark name"
      />
      <input
        type="text"
        id="bookmarkUrlInput"
        placeholder="URL"
      />
      <div class="bookmark-popup-buttons">
        <button class="btn-cancel" onclick="closeBookmarkPopup()">Cancel</button>
        <button class="btn-save" onclick="saveBookmarkFromPopup()">Save</button>
      </div>
    </div>

    <!-- Downloads Panel -->
    <div class="settings-panel" id="downloadsPanel">
      <div class="settings-header">
        <h2>⬇️ Downloads</h2>
        <button class="close-settings" onclick="toggleDownloads()">✕</button>
      </div>

      <div class="settings-section">
        <div id="downloadsList">
          <div class="downloads-empty">No downloads yet</div>
        </div>
      </div>

      <div class="settings-section" style="border-bottom:none;">
        <button class="settings-save-btn" onclick="clearDownloadsList()" style="background:rgba(255,255,255,0.1);">
          Clear list
        </button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h2>⚙️ Settings</h2>
        <button class="close-settings" onclick="toggleSettings()">✕</button>
      </div>

      <div class="settings-section">
        <h3>🎨 Theme</h3>
        <div class="theme-options">
          <div class="theme-options">
  <button class="theme-btn active" onclick="setTheme('dark')"   id="theme-dark">🌙 Dark</button>
  <button class="theme-btn"        onclick="setTheme('light')"  id="theme-light">☀️ Light</button>
  <button class="theme-btn"        onclick="setTheme('purple')" id="theme-purple">💜 Purple</button>
  <button class="theme-btn"        onclick="setTheme('ocean')"  id="theme-ocean">🌊 Ocean</button>
  <button class="theme-btn"        onclick="setTheme('brown')"  id="theme-brown">🟤 Brown</button>
  <button class="theme-btn"        onclick="setTheme('gray')"   id="theme-gray">⚪ Gray</button>
  <button class="theme-btn"        onclick="setTheme('white')"  id="theme-white">🤍 White</button>
  <button class="theme-btn"        onclick="setTheme('black')"  id="theme-black">⚫ Black</button>
  <button class="theme-btn"        onclick="setTheme('red')"    id="theme-red">❤️ Red</button>
  <button class="theme-btn"        onclick="setTheme('green')"  id="theme-green">💚 Green</button>
  <button class="theme-btn"        onclick="setTheme('pink')"   id="theme-pink">💗 Pink</button>
</div>
      </div>

      <div class="settings-section">
        <h3>🗂️ Tabs</h3>
        <div class="toggle-row" style="border-bottom:none;">
          <span>Vertical Tabs</span>
          <label class="toggle">
            <input type="checkbox" id="verticalTabsToggle"
                   onchange="toggleTabLayout()"/>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h3>🏠 Homepage</h3>
        <input class="settings-input" id="homepageInput"
               type="text" placeholder="Enter homepage URL"/>
        <button class="settings-save-btn" onclick="saveHomepage()">Save</button>
      </div>

      <div class="settings-section">
        <h3>🔍 Search Engine</h3>
        <div class="search-options">
          <button class="search-btn active" onclick="setSearch('google')"     id="search-google">🔍 Google</button>
          <button class="search-btn"        onclick="setSearch('bing')"       id="search-bing">🅱️ Bing</button>
          <button class="search-btn"        onclick="setSearch('duckduckgo')" id="search-ddg">🦆 DuckDuckGo</button>
        </div>
      </div>

      <div class="settings-section">
        <h3>🔒 Privacy</h3>
        <div class="toggle-row">
          <span>Show Bookmark Bar</span>
          <label class="toggle">
            <input type="checkbox" checked id="bookmarkBarToggle"
                   onchange="toggleBookmarkBar()"/>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h3>📌 Bookmarks</h3>
        <div id="bookmarkList"></div>
      </div>
    </div>

  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════
    function displayUrl(url) {
      if (!url) return '';
      if (url.includes('newtab.html')) return '';
      return url;
    }

    let homepage        = 'newtab.html';
    let searchEngine    = 'google';
    let tabs            = [];
    let activeTab       = null;

    // ── Split view state ────────────────────────────────────
    // splitGroup: ordered array of tab ids currently shown side-by-side (max 4).
    // null/[] means no split — normal single-tab view.
    let splitGroup = [];
    let splitSizes = null; // { cols: [fr,fr,...], rows: [fr,fr,...] } — null = use even defaults
    let draggedTabId = null;
    let bookmarks       = [];
    let currentSettings = {};

    const engines = {
      google:     'https://www.google.com/search?q=',
      bing:       'https://www.bing.com/search?q=',
      duckduckgo: 'https://duckduckgo.com/?q=',
    };

    // ═══════════════════════════════════════════════════════
    // BOOKMARKS
    // ═══════════════════════════════════════════════════════

    async function loadBookmarks() {
      try {
        const saved = await window.electronAPI.getBookmarks();
        bookmarks = Array.isArray(saved) ? saved : [];
        renderBookmarkBar();
        renderBookmarkList();
      } catch (e) {
        console.error('Failed to load bookmarks:', e);
        bookmarks = [];
      }
    }

    async function saveAllBookmarks() {
      try {
        await window.electronAPI.saveBookmarks(bookmarks);
      } catch (e) {
        console.error('Failed to save bookmarks:', e);
      }
    }

    // Opens the bookmark popup
    function handleBookmarkClick() {
      const url = document.getElementById('urlBar').value.trim();

      // If already bookmarked, remove it immediately
      const existingIndex = bookmarks.findIndex(b => b.url === url);
      if (existingIndex !== -1) {
        bookmarks.splice(existingIndex, 1);
        saveAllBookmarks();
        renderBookmarkBar();
        renderBookmarkList();
        updateStar(url);
        return;
      }

      // Not bookmarked — show the popup
      document.getElementById('bookmarkNameInput').value = document.title || url;
      document.getElementById('bookmarkUrlInput').value  = url;
      document.getElementById('bookmarkPopup').classList.add('show');
      document.getElementById('popupOverlay').classList.add('show');
      document.getElementById('bookmarkNameInput').focus();
      document.getElementById('bookmarkNameInput').select();
    }

    function closeBookmarkPopup() {
      document.getElementById('bookmarkPopup').classList.remove('show');
      document.getElementById('popupOverlay').classList.remove('show');
    }

    async function saveBookmarkFromPopup() {
      const name = document.getElementById('bookmarkNameInput').value.trim();
      const url  = document.getElementById('bookmarkUrlInput').value.trim();

      if (!name || !url) return;

      bookmarks.push({
        name: name,
        url: url,
        dateAdded: new Date().toISOString()
      });

      await saveAllBookmarks();
      renderBookmarkBar();
      renderBookmarkList();
      updateStar(url);
      closeBookmarkPopup();
    }

    // Save bookmark when user presses Enter in the popup
    document.addEventListener('keydown', function(e) {
      const popup = document.getElementById('bookmarkPopup');
      if (popup.classList.contains('show') && e.key === 'Enter') {
        saveBookmarkFromPopup();
      }
      if (popup.classList.contains('show') && e.key === 'Escape') {
        closeBookmarkPopup();
      }
    });

    async function removeBookmark(index) {
      bookmarks.splice(index, 1);
      await saveAllBookmarks();
      renderBookmarkBar();
      renderBookmarkList();
      const url = document.getElementById('urlBar').value;
      updateStar(url);
    }

    function updateStar(url) {
      const btn = document.getElementById('bookmarkBtn');
      if (!btn) return;
      const isBookmarked = bookmarks.some(b => b.url === url);
      btn.textContent = isBookmarked ? '★' : '☆';
      btn.style.color = isBookmarked ? '#f5a623' : 'rgba(255,255,255,0.5)';
    }

    function getDomain(url) {
      try { return new URL(url).hostname; }
      catch (e) { return ''; }
    }

    function renderBookmarkBar() {
      const bar = document.getElementById('bookmarkBar');
      if (!bar) return;

      if (bookmarks.length === 0) {
        bar.innerHTML = `<span style="color:rgba(255,255,255,0.2);font-size:12px;padding:0 8px">No bookmarks yet — click ☆ to add one</span>`;
        return;
      }

      bar.innerHTML = bookmarks.map((b, i) => `
        <span class="bookmark-item" onclick="loadUrl('${b.url.replace(/'/g, "\\'")}')">
          <img
            src="https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=16"
            width="14" height="14"
            style="border-radius:2px;flex-shrink:0;margin-right:4px"
            onerror="this.style.display='none'"
          />${b.name}
          <button class="bm-remove"
                  onclick="event.stopPropagation();removeBookmark(${i})">✕</button>
        </span>
      `).join('');
    }

    function renderBookmarkList() {
      const el = document.getElementById('bookmarkList');
      if (!el) return;

      if (bookmarks.length === 0) {
        el.innerHTML = `<p style="color:rgba(255,255,255,0.4);font-size:13px">No bookmarks yet</p>`;
        return;
      }

      el.innerHTML = bookmarks.map((b, i) => `
        <div class="bm-list-item">
          <img
            src="https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=16"
            width="14" height="14"
            style="border-radius:2px;flex-shrink:0"
            onerror="this.style.display='none'"
          />
          <span onclick="loadUrl('${b.url.replace(/'/g, "\\'")}');toggleSettings()"
                style="flex:1;cursor:pointer;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${b.name}
          </span>
          <button onclick="removeBookmark(${i})"
                  style="background:none;border:none;color:rgba(255,100,100,0.6);cursor:pointer;font-size:12px;padding:4px">✕</button>
        </div>
      `).join('');
    }

    // ═══════════════════════════════════════════════════════
    // TABS
    // ═══════════════════════════════════════════════════════

    function addTab(url) {
      url = url || homepage;
      const id  = 'tab-' + Date.now();
      const tab = { id, url, title: 'New Tab' };
      tabs.push(tab);
      createWebview(tab);

      if (splitGroup.length) {
        // Don't disturb an active split — the new tab opens in the background.
        // It'll only take over the view if the user clicks it or drags it
        // into/out of the split themselves.
        renderTabs();
      } else {
        switchTab(id);
        renderTabs();
      }
    }

    function createWebview(tab) {
  const wv = document.createElement('webview');
  wv.id = 'wv-' + tab.id;
  wv.src = tab.url;
  wv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none';
  wv.setAttribute('partition', 'persist:main');

      wv.addEventListener('did-navigate', e => {
        tab.url = e.url;
        if (activeTab === tab.id) {
          document.getElementById('urlBar').value = displayUrl(e.url);
          updateStar(e.url);
        }
      });

      wv.addEventListener('did-navigate-in-page', e => {
        tab.url = e.url;
        if (activeTab === tab.id) {
          document.getElementById('urlBar').value = displayUrl(e.url);
          updateStar(e.url);
        }
      });

      wv.addEventListener('page-title-updated', e => {
        tab.title = e.title || 'New Tab';
        renderTabs();
      });

      document.getElementById('webviewContainer').appendChild(wv);
    }

    function switchTab(id) {
      activeTab = id;
      if (splitGroup.length) {
        // In split view, clicking a tab that's already in the split just
        // focuses it (for toolbar/url-bar purposes) without leaving split mode.
        if (splitGroup.includes(id)) {
          renderSplitFocus();
          renderTabs();
          return;
        }
        // Switching to a tab outside the split exits split view entirely.
        exitSplitView();
      }
      document.querySelectorAll('#webviewContainer webview').forEach(wv => {
        wv.style.display = 'none';
      });
      const wv = document.getElementById('wv-' + id);
      if (wv) {
        wv.style.display = 'flex';
        const tab = tabs.find(t => t.id === id);
        if (tab) {
          document.getElementById('urlBar').value = displayUrl(tab.url || '');
          updateStar(tab.url || '');
        }
      }
      renderTabs();
    }

    function closeTab(id, e) {
      e.stopPropagation();
      const index = tabs.findIndex(t => t.id === id);
      tabs = tabs.filter(t => t.id !== id);
      const wv = document.getElementById('wv-' + id);
      if (wv) wv.remove();

      if (splitGroup.includes(id)) {
        splitGroup = splitGroup.filter(tid => tid !== id);
        splitSizes = null;
        if (splitGroup.length < 2) {
          exitSplitView(splitGroup[0] || (tabs[0] && tabs[0].id));
        } else {
          renderSplitView();
        }
      }

      if (tabs.length === 0) { addTab(); return; }
      if (activeTab === id && !splitGroup.length) {
        const newIndex = Math.min(index, tabs.length - 1);
        switchTab(tabs[newIndex].id);
      }
      renderTabs();
    }

    function renderTabs() {
      const list = document.getElementById('tabList');
      list.innerHTML = tabs.map(t => `
        <div class="tab ${t.id === activeTab ? 'active' : ''} ${splitGroup.includes(t.id) ? 'in-split' : ''}"
             draggable="true"
             ondragstart="handleTabDragStart(event, '${t.id}')"
             ondragover="handleTabDragOver(event, '${t.id}')"
             ondragleave="handleTabDragLeave(event)"
             ondrop="handleTabDrop(event, '${t.id}')"
             ondragend="handleTabDragEnd(event)"
             onclick="switchTab('${t.id}')">
          <span class="tab-title">${t.title}</span>
          <button class="tab-close" onclick="closeTab('${t.id}', event)">✕</button>
        </div>`).join('');

      const rail = document.getElementById('tabListVertical');
      if (rail) {
        rail.innerHTML = tabs.map(t => `
          <div class="tab-vertical ${t.id === activeTab ? 'active' : ''} ${splitGroup.includes(t.id) ? 'in-split' : ''}"
               draggable="true"
               ondragstart="handleTabDragStart(event, '${t.id}')"
               ondragover="handleTabDragOver(event, '${t.id}')"
               ondragleave="handleTabDragLeave(event)"
               ondrop="handleTabDrop(event, '${t.id}')"
               ondragend="handleTabDragEnd(event)"
               onclick="switchTab('${t.id}')"
               title="${(t.title || '').replace(/"/g, '&quot;')}">
            <span class="tab-vertical-dot"></span>
            <span class="tab-vertical-title">${t.title}</span>
            <button class="tab-vertical-close" onclick="closeTab('${t.id}', event)">✕</button>
          </div>`).join('');
      }

      if (splitGroup.length) updateSplitPaneLabels();
    }

    // ═══════════════════════════════════════════════════════
    // DRAG & DROP — reorder tabs, or drop-onto-tab to split
    // ═══════════════════════════════════════════════════════

    function handleTabDragStart(e, id) {
      draggedTabId = id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    }

    function handleTabDragOver(e, overId) {
      if (!draggedTabId || draggedTabId === overId) return;
      e.preventDefault();
      e.currentTarget.classList.add('drop-target');
    }

    function handleTabDragLeave(e) {
      e.currentTarget.classList.remove('drop-target');
    }

    function handleTabDragEnd(e) {
      document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
      draggedTabId = null;
    }

    function handleTabDrop(e, targetId) {
      e.preventDefault();
      e.currentTarget.classList.remove('drop-target');
      const sourceId = draggedTabId;
      draggedTabId = null;
      if (!sourceId || sourceId === targetId) return;

      // Holding the drop with Alt/Option reorders instead of splitting,
      // for people who just want to rearrange without entering split view.
      if (e.altKey) {
        reorderTab(sourceId, targetId);
        return;
      }

      splitWithTab(sourceId, targetId);
    }

    function reorderTab(sourceId, targetId) {
      const fromIndex = tabs.findIndex(t => t.id === sourceId);
      const toIndex = tabs.findIndex(t => t.id === targetId);
      if (fromIndex === -1 || toIndex === -1) return;
      const [moved] = tabs.splice(fromIndex, 1);
      tabs.splice(toIndex, 0, moved);
      renderTabs();
    }

    // ═══════════════════════════════════════════════════════
    // SPLIT VIEW — up to 4 tabs side by side
    // ═══════════════════════════════════════════════════════

    function splitWithTab(sourceId, targetId) {
      if (!splitGroup.length) {
        // Starting a fresh split with exactly these two tabs.
        splitGroup = [targetId, sourceId];
      } else if (splitGroup.includes(targetId) && !splitGroup.includes(sourceId)) {
        // Adding a third/fourth tab onto an existing split pane.
        if (splitGroup.length >= 4) {
          showToast('Split view supports up to 4 tabs');
          return;
        }
        splitGroup.push(sourceId);
      } else if (!splitGroup.includes(sourceId) && !splitGroup.includes(targetId)) {
        splitGroup = [targetId, sourceId];
      } else {
        return; // both already in split, or nothing meaningful to do
      }
      splitSizes = null; // pane count changed — fall back to even sizing
      activeTab = sourceId;
      renderSplitView();
      renderTabs();
    }

    function exitSplitView(focusId) {
      const keepId = focusId || activeTab || splitGroup[0];
      const container = document.getElementById('webviewContainer');

      // Move every webview back out of its pane wrapper directly into the container
      document.querySelectorAll('.split-pane webview').forEach(wv => {
        wv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none';
        container.appendChild(wv);
      });
      document.querySelectorAll('.split-pane').forEach(el => el.remove());

      splitGroup = [];
      splitSizes = null;
      container.classList.remove('split-active');
      delete container.dataset.splitCount;
      container.style.gridTemplateColumns = '';
      container.style.gridTemplateRows = '';
      if (keepId) switchTab(keepId);
    }

    function defaultSplitSizes(count) {
      if (count === 2) return { cols: [1, 1], rows: [1] };
      return { cols: [1, 1], rows: [1, 1] }; // 3 (pane 3 spans full row) or 4 (2x2)
    }

    function splitGridTemplate(count) {
      const sizes = splitSizes || defaultSplitSizes(count);
      return {
        cols: sizes.cols.map(f => `${f}fr`).join(' '),
        rows: sizes.rows.map(f => `${f}fr`).join(' ')
      };
    }

    function renderSplitView() {
      const container = document.getElementById('webviewContainer');

      // If the pane structure already matches splitGroup, don't touch the DOM
      // at all — reparenting a live <webview> breaks its painted contents,
      // so we only rebuild when the actual set/order of split tabs changes.
      const existingPaneIds = Array.from(container.querySelectorAll('.split-pane'))
        .map(p => p.dataset.tabId);
      const alreadyCorrect = existingPaneIds.length === splitGroup.length &&
        existingPaneIds.every((id, i) => id === splitGroup[i]);
      if (alreadyCorrect) {
        updateSplitPaneLabels();
        return;
      }

      container.classList.add('split-active');
      container.dataset.splitCount = String(splitGroup.length);

      const { cols, rows } = splitGridTemplate(splitGroup.length);
      container.style.gridTemplateColumns = cols;
      container.style.gridTemplateRows = rows;

      // Tear down old pane wrappers/resizers, but keep webviews around to reuse.
      document.querySelectorAll('.split-pane webview').forEach(wv => container.appendChild(wv));
      document.querySelectorAll('.split-pane, .split-resizer').forEach(el => el.remove());

      // Any tab not in the split stays hidden as a loose child of the container.
      tabs.forEach(t => {
        const wv = document.getElementById('wv-' + t.id);
        if (wv && !splitGroup.includes(t.id)) wv.style.display = 'none';
      });

      splitGroup.forEach((id, order) => {
        const tab = tabs.find(t => t.id === id);
        const wv = document.getElementById('wv-' + id);
        if (!tab || !wv) return;

        const pane = document.createElement('div');
        pane.className = 'split-pane';
        pane.dataset.tabId = id;
        if (splitGroup.length === 3 && order === 2) {
          pane.style.gridColumn = '1 / span 2';
        }

        const header = document.createElement('div');
        header.className = 'split-pane-header' + (id === activeTab ? ' active' : '');
        header.innerHTML = `
          <span class="split-pane-title">${tab.title || 'New Tab'}</span>
          <button class="split-pane-close" title="Remove from split">✕</button>
        `;
        header.addEventListener('click', (e) => {
          if (e.target.closest('.split-pane-close')) return;
          activeTab = id;
          renderSplitFocus();
          renderTabs();
        });
        header.querySelector('.split-pane-close').addEventListener('click', (e) => {
          e.stopPropagation();
          splitGroup = splitGroup.filter(tid => tid !== id);
          splitSizes = null;
          if (splitGroup.length < 2) {
            exitSplitView(splitGroup[0] || id);
          } else {
            renderSplitView();
          }
          renderTabs();
        });

        const body = document.createElement('div');
        body.className = 'split-pane-body';
        wv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:flex';
        body.appendChild(wv);

        pane.appendChild(header);
        pane.appendChild(body);
        container.appendChild(pane);

        // Reparenting a <webview> can leave its compositor thinking it still
        // has the old size/visibility, so force a hard re-layout: toggling
        // display off/on is a reliable way to make Chromium's compositor
        // actually repaint the guest page at its new size.
        requestAnimationFrame(() => {
          wv.style.display = 'none';
          requestAnimationFrame(() => {
            wv.style.display = 'flex';
            window.dispatchEvent(new Event('resize'));
          });
        });
      });

      attachSplitResizers(container, splitGroup.length);
    }

    // ── Drag-to-resize handles between split panes ─────────────
    function attachSplitResizers(container, count) {
      const sizes = splitSizes || defaultSplitSizes(count);

      // Vertical resizer (drag left/right) between column 1 and 2 —
      // present for 2, 3, or 4 panes since they all have a 2-column layout.
      const vResizer = document.createElement('div');
      vResizer.className = 'split-resizer split-resizer-v';
      positionResizer(vResizer, 'col', sizes);
      container.appendChild(vResizer);
      makeResizerDraggable(vResizer, container, 'col', sizes);

      // Horizontal resizer (drag up/down) between row 1 and 2 —
      // only present for 3 or 4 panes (2-row layouts).
      if (count >= 3) {
        const hResizer = document.createElement('div');
        hResizer.className = 'split-resizer split-resizer-h';
        positionResizer(hResizer, 'row', sizes);
        container.appendChild(hResizer);
        makeResizerDraggable(hResizer, container, 'row', sizes);
      }
    }

    // Places a resizer handle at the boundary implied by the current fr ratio,
    // since that boundary moves once the user has dragged away from 50/50.
    function positionResizer(handle, axis, sizes) {
      const values = axis === 'col' ? sizes.cols : sizes.rows;
      const ratio = values[0] / (values[0] + values[1]); // 0..1
      const pct = ratio * 100;
      if (axis === 'col') {
        handle.style.left = `${pct}%`;
      } else {
        handle.style.top = `${pct}%`;
      }
    }

    function makeResizerDraggable(handle, container, axis, sizes) {
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const rect = container.getBoundingClientRect();
        const startPos = axis === 'col' ? e.clientX : e.clientY;
        const totalSize = axis === 'col' ? rect.width : rect.height;
        const startSizes = axis === 'col' ? [...sizes.cols] : [...sizes.rows];
        const totalFr = startSizes.reduce((a, b) => a + b, 0);

        document.body.style.cursor = axis === 'col' ? 'col-resize' : 'row-resize';
        document.body.style.userSelect = 'none';

        function onMouseMove(e) {
          const currentPos = axis === 'col' ? e.clientX : e.clientY;
          const deltaPx = currentPos - startPos;
          const deltaFr = (deltaPx / totalSize) * totalFr;

          let first = startSizes[0] + deltaFr;
          let second = startSizes[1] - deltaFr;

          // Keep a sane minimum so a pane can't be dragged down to nothing.
          const minFr = totalFr * 0.15;
          if (first < minFr) { second -= (minFr - first); first = minFr; }
          if (second < minFr) { first -= (minFr - second); second = minFr; }

          const newSizes = [first, second];
          splitSizes = splitSizes || defaultSplitSizes(splitGroup.length);
          if (axis === 'col') {
            splitSizes.cols = newSizes;
          } else {
            splitSizes.rows = newSizes;
          }
          const { cols, rows } = splitGridTemplate(splitGroup.length);
          container.style.gridTemplateColumns = cols;
          container.style.gridTemplateRows = rows;
          positionResizer(handle, axis, splitSizes);
        }

        function onMouseUp() {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          // Nudge webviews to repaint at their new size, same trick as on creation.
          document.querySelectorAll('.split-pane webview').forEach(wv => {
            wv.style.display = 'none';
            requestAnimationFrame(() => { wv.style.display = 'flex'; });
          });
          window.dispatchEvent(new Event('resize'));
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
    }

    // Cheap, non-destructive: just refresh titles/active-state text on
    // existing pane headers without touching any webview's DOM position.
    function updateSplitPaneLabels() {
      document.querySelectorAll('.split-pane').forEach(pane => {
        const id = pane.dataset.tabId;
        const tab = tabs.find(t => t.id === id);
        const header = pane.querySelector('.split-pane-header');
        if (!tab || !header) return;
        header.classList.toggle('active', id === activeTab);
        const titleEl = header.querySelector('.split-pane-title');
        if (titleEl) titleEl.textContent = tab.title || 'New Tab';
      });
    }

    function renderSplitFocus() {
      const tab = tabs.find(t => t.id === activeTab);
      if (tab) {
        document.getElementById('urlBar').value = displayUrl(tab.url || '');
        updateStar(tab.url || '');
      }
      document.querySelectorAll('.split-pane-header').forEach(h => h.classList.remove('active'));
      renderSplitView();
    }

    // ═══════════════════════════════════════════════════════
    // VERTICAL TABS LAYOUT
    // ═══════════════════════════════════════════════════════

    function applyTabLayout(layout) {
      const shell = document.getElementById('browserShell');
      if (!shell) return;
      shell.classList.toggle('vertical-tabs', layout === 'vertical');
      const checkbox = document.getElementById('verticalTabsToggle');
      if (checkbox) checkbox.checked = (layout === 'vertical');
    }

    async function toggleTabLayout() {
      const checkbox = document.getElementById('verticalTabsToggle');
      const next = checkbox && checkbox.checked ? 'vertical' : 'horizontal';
      applyTabLayout(next);
      currentSettings.tabLayout = next;
      await saveSettings();
    }

    function toggleRailCollapse() {
      const rail = document.getElementById('tabRail');
      const btn  = document.getElementById('railCollapseBtn');
      if (!rail) return;
      const collapsed = rail.classList.toggle('collapsed');
      if (btn) btn.textContent = collapsed ? '›' : '‹';
      currentSettings.railCollapsed = collapsed;
      saveSettings();
    }

    // ═══════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════

    function getActiveWebview() {
      return document.getElementById('wv-' + activeTab);
    }

    function navigate() {
      let url = document.getElementById('urlBar').value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = url.includes('.') && !url.includes(' ')
          ? 'https://' + url
          : engines[searchEngine] + encodeURIComponent(url);
      }
      const wv = getActiveWebview();
      if (wv) wv.src = url;
    }

    function loadUrl(url) {
      const wv = getActiveWebview();
      if (wv) {
        wv.src = url;
        document.getElementById('urlBar').value = displayUrl(url);
        updateStar(url);
      }
    }

    function goBack()    { const wv = getActiveWebview(); if (wv) wv.goBack(); }
    function goForward() { const wv = getActiveWebview(); if (wv) wv.goForward(); }
    function reloadPage(){ const wv = getActiveWebview(); if (wv) wv.reload(); }
    function goHome()    { loadUrl(homepage); }

    // ═══════════════════════════════════════════════════════
    // SETTINGS
    // ═══════════════════════════════════════════════════════

    function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  renderBookmarkList();
}

// ── Apply theme to the UI ──────────────────────────────────
function applyTheme(theme) {
  const themes = {
    dark:   'linear-gradient(135deg, #2b1055, #4d1d75, #1a3a6b)',
    light:  'linear-gradient(135deg, #a8c8ff, #c9b6f5, #f5c6e0)',
    purple: 'linear-gradient(135deg, #1a0a2e, #3d1466, #1a0a2e)',
    ocean:  'linear-gradient(135deg, #001e3c, #003e5c, #001e3c)',
    brown:  'linear-gradient(135deg, #3e2723, #5d4037, #4e342e)',
    gray:   'linear-gradient(135deg, #4a4a4a, #6b6b6b, #3d3d3d)',
    white:  'linear-gradient(135deg, #f5f5f7, #e8e8ec, #fafafa)',
    black:  'linear-gradient(135deg, #050505, #1a1a1a, #000000)',
    red:    'linear-gradient(135deg, #4a0e0e, #7a1f1f, #2e0707)',
    green:  'linear-gradient(135deg, #0d2818, #1e4d33, #0a1f12)',
    pink:   'linear-gradient(135deg, #d68fb0, #f0b8d0, #e89dc0)',
  };

  // Themes whose gradient is bright enough to need dark text instead of white
  const lightTextThemes = ['light', 'white', 'pink'];

  const gradient = themes[theme] || themes.dark;
  document.body.setAttribute('data-theme', lightTextThemes.includes(theme) ? 'light' : 'dark');
  document.body.style.background = gradient;
  document.querySelector('.browser-shell').style.background = gradient;

  // Update active button
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('theme-' + theme);
  if (btn) btn.classList.add('active');
}

// ── Set theme and save it ──────────────────────────────────
async function setTheme(theme) {
  applyTheme(theme);
  currentSettings.theme = theme;
  await saveSettings();
}

// ── Save homepage ──────────────────────────────────────────
async function saveHomepage() {
  const val = document.getElementById('homepageInput').value.trim();
  if (!val) return;
  homepage = val;
  currentSettings.homepage = val;
  await saveSettings();
  showToast('✅ Homepage saved!');
}

// ── Set search engine and save it ─────────────────────────
async function setSearch(engine) {
  searchEngine = engine;
  currentSettings.searchEngine = engine;
  await saveSettings();

  document.querySelectorAll('.search-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('search-' + engine);
  if (btn) btn.classList.add('active');
}

// ── Toggle bookmark bar and save it ───────────────────────
async function toggleBookmarkBar() {
  const show = document.getElementById('bookmarkBarToggle').checked;
  document.getElementById('bookmarkBar').style.display = show ? 'flex' : 'none';
  currentSettings.showBookmarkBar = show;
  await saveSettings();
}

// ── Save all settings to disk ──────────────────────────────
async function saveSettings() {
  try {
    await window.electronAPI.saveSettings(currentSettings);
  } catch (e) {
    console.error('Failed to save settings:', e);
  }
}

// ── Load settings from disk ────────────────────────────────
async function loadSettings() {
  try {
    const saved = await window.electronAPI.getSettings();
    currentSettings = saved;

    // Apply loaded settings to the UI
    // Apply loaded settings to the UI
    homepage     = saved.homepage     || 'https://google.com';
    searchEngine = saved.searchEngine || 'google';

    // Apply theme
    applyTheme(saved.theme || 'dark');

    // Apply vertical/horizontal tab layout
    applyTabLayout(saved.tabLayout || 'horizontal');
    if (saved.railCollapsed) {
      const rail = document.getElementById('tabRail');
      const railBtn = document.getElementById('railCollapseBtn');
      if (rail) rail.classList.add('collapsed');
      if (railBtn) railBtn.textContent = '›';
    }

    // Apply homepage input value
    const homepageInput = document.getElementById('homepageInput');
    if (homepageInput) homepageInput.value = homepage;

    // Apply search engine button
    document.querySelectorAll('.search-btn').forEach(b => b.classList.remove('active'));
    const searchBtn = document.getElementById('search-' + searchEngine);
    if (searchBtn) searchBtn.classList.add('active');

    // Apply bookmark bar visibility
    const bookmarkBarToggle = document.getElementById('bookmarkBarToggle');
    if (bookmarkBarToggle) {
      bookmarkBarToggle.checked = saved.showBookmarkBar !== false;
      document.getElementById('bookmarkBar').style.display =
        saved.showBookmarkBar !== false ? 'flex' : 'none';
    }

  } catch (e) {
    currentSettings = {
  homepage: 'https://google.com',
  searchEngine: 'google',
  theme: 'dark',
  showBookmarkBar: true
};
  }
}
// ── Toast notification (replaces alert) ───────────────────
function showToast(message) {
  // Remove existing toast if any
  const existing = document.getElementById('toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,30,50,0.95);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 999999;
    transition: opacity 0.3s;
  `;
  document.body.appendChild(toast);

  // Auto remove after 2.5 seconds
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

    // ═══════════════════════════════════════════════════════
    // DOWNLOADS
    // ═══════════════════════════════════════════════════════

    let downloadsCache = [];

    function toggleDownloads() {
      const panel = document.getElementById('downloadsPanel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) refreshDownloadsList();
    }

    function formatBytes(bytes) {
      if (!bytes || bytes <= 0) return '0 KB';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      let n = bytes;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function fileExt(filename) {
      const parts = (filename || '').split('.');
      return parts.length > 1 ? parts.pop().toUpperCase() : 'FILE';
    }

    function renderDownloads(list) {
      downloadsCache = list || [];
      const container = document.getElementById('downloadsList');
      const badge = document.getElementById('downloadBadge');

      const activeCount = downloadsCache.filter(d => d.state === 'progressing').length;
      if (activeCount > 0) {
        badge.style.display = 'flex';
        badge.textContent = activeCount;
      } else {
        badge.style.display = 'none';
      }

      if (!downloadsCache.length) {
        container.innerHTML = '<div class="downloads-empty">No downloads yet</div>';
        return;
      }

      container.innerHTML = downloadsCache.map(d => {
        const pct = d.totalBytes > 0 ? Math.min(100, Math.round((d.receivedBytes / d.totalBytes) * 100)) : 0;
        const isDone = d.state === 'completed';
        const isActive = d.state === 'progressing';
        const sizeLine = isActive
          ? `${formatBytes(d.receivedBytes)} of ${d.totalBytes > 0 ? formatBytes(d.totalBytes) : '?'}`
          : (isDone ? formatBytes(d.receivedBytes || d.totalBytes) : d.state);
        const safePath = d.savePath.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

        return `
          <div class="download-item">
            <div class="download-icon">📄</div>
            <div class="download-info">
              <div class="download-name" title="${d.filename}">${d.filename}</div>
              <div class="download-meta">${sizeLine}</div>
              ${isActive ? `
                <div class="download-progress-track">
                  <div class="download-progress-fill" style="width:${pct}%"></div>
                </div>
              ` : ''}
              <div class="download-actions">
                ${isDone ? `
                  <span onclick="openDownloadItem('${safePath}')">Open</span>
                  <span onclick="showDownloadInFolder('${safePath}')">Show in folder</span>
                ` : ''}
                <span onclick="removeDownloadItem('${d.id}')">Remove</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function refreshDownloadsList() {
      const list = await window.electronAPI.getDownloads();
      renderDownloads(list);
    }

    async function clearDownloadsList() {
      const list = await window.electronAPI.clearDownloads();
      renderDownloads(list);
    }

    async function removeDownloadItem(id) {
      const list = await window.electronAPI.removeDownload(id);
      renderDownloads(list);
    }

    async function openDownloadItem(savePath) {
      await window.electronAPI.openDownload(savePath);
    }

    async function showDownloadInFolder(savePath) {
      await window.electronAPI.showInFolder(savePath);
    }

    // Live updates pushed from main process as downloads progress
    window.electronAPI.onDownloadsUpdate((list) => {
      const prevCompleted = new Set(
        downloadsCache.filter(d => d.state === 'completed').map(d => d.id)
      );
      const justFinished = list.find(d => d.state === 'completed' && !prevCompleted.has(d.id));
      if (justFinished) showToast(`Downloaded ${justFinished.filename}`);

      renderDownloads(list);
    });

    // ═══════════════════════════════════════════════════════
    // AUTO-UPDATE
    // ═══════════════════════════════════════════════════════

    let updateState = 'idle'; // idle | available | downloading | downloaded

    // Very small markdown-ish formatter so GitHub release notes
    // (which are markdown) read reasonably instead of as raw text.
    function formatReleaseNotes(raw) {
      if (!raw) return '<p>No details were provided for this update.</p>';
      let html = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Bullet lines starting with - or *
      const lines = html.split('\n');
      let out = '';
      let inList = false;
      for (const line of lines) {
        const bullet = line.match(/^\s*[-*]\s+(.*)/);
        if (bullet) {
          if (!inList) { out += '<ul>'; inList = true; }
          out += `<li>${bullet[1]}</li>`;
        } else {
          if (inList) { out += '</ul>'; inList = false; }
          if (line.trim()) out += `<p>${line.trim()}</p>`;
        }
      }
      if (inList) out += '</ul>';
      return out || '<p>No details were provided for this update.</p>';
    }

    function showUpdateAvailable(info) {
      updateState = 'available';
      document.getElementById('updateTitle').textContent = 'Update available';
      document.getElementById('updateVersionLabel').textContent = `Flamby v${info.version}`;
      document.getElementById('updateNotes').innerHTML = formatReleaseNotes(info.releaseNotes);

      document.getElementById('updateProgressTrack').style.display = 'none';
      document.getElementById('updateProgressLabel').style.display = 'none';
      document.getElementById('updateButtons').style.display = 'flex';

      const actionBtn = document.getElementById('updateActionBtn');
      actionBtn.textContent = 'Update now';
      actionBtn.disabled = false;

      document.getElementById('updateToast').classList.add('show');
    }

    function showUpdateDownloading() {
      updateState = 'downloading';
      document.getElementById('updateTitle').textContent = 'Downloading update…';
      document.getElementById('updateProgressTrack').style.display = 'block';
      document.getElementById('updateProgressLabel').style.display = 'block';

      const actionBtn = document.getElementById('updateActionBtn');
      actionBtn.textContent = 'Downloading…';
      actionBtn.disabled = true;
    }

    function showUpdateDownloaded() {
      updateState = 'downloaded';
      document.getElementById('updateTitle').textContent = 'Update ready';
      document.getElementById('updateProgressLabel').textContent = 'Downloaded — restart to install';

      const actionBtn = document.getElementById('updateActionBtn');
      actionBtn.textContent = 'Restart now';
      actionBtn.disabled = false;
    }

    function dismissUpdateToast() {
      document.getElementById('updateToast').classList.remove('show');
    }

    async function handleUpdateAction() {
      if (updateState === 'available') {
        showUpdateDownloading();
        await window.electronAPI.downloadUpdate();
      } else if (updateState === 'downloaded') {
        await window.electronAPI.installUpdate();
      }
    }

    window.electronAPI.onUpdateAvailable((info) => {
      showUpdateAvailable(info);
    });

    window.electronAPI.onUpdateProgress((progress) => {
      const pct = Math.round(progress.percent || 0);
      document.getElementById('updateProgressFill').style.width = pct + '%';
      document.getElementById('updateProgressLabel').textContent = `${pct}% downloaded`;
    });

    window.electronAPI.onUpdateDownloaded(() => {
      showUpdateDownloaded();
    });

    window.electronAPI.onUpdateError((err) => {
      // Quietly drop it — most "errors" here are just "no update found" /
      // network blips, and we don't want to nag the user with a popup for that.
      console.warn('Update check issue:', err && err.message);
    });

    // ═══════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════
    async function init() {
  // Load settings first so homepage is correct before opening tab
  await loadSettings();
  // Then load bookmarks
  await loadBookmarks();
  // Then open the first tab with the correct homepage
  addTab(homepage === 'newtab.html' ? homepage : homepage);
  // Load any in-progress / past downloads
  refreshDownloadsList();
}

    init();
  </script>
