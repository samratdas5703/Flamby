      await window.electronAPI.openDownload(savePath);
    }

    async function showDownloadInFolder(savePath) {
      await window.electronAPI.showInFolder(savePath);
    }

    // Live updates pushed from main process as downloads progress
    window.electronAPI.onDownloadsUpdate((list) => {
      const prevCompleted = new Set(
        downloadsCache.filter(d => d.state === 'completed').map(d => d.id)
      );
      const justFinished = list.find(d => d.state === 'completed' && !prevCompleted.has(d.id));
      if (justFinished) showToast(`Downloaded ${justFinished.filename}`);

      renderDownloads(list);
    });

    // ═══════════════════════════════════════════════════════
    // AUTO-UPDATE
    // ═══════════════════════════════════════════════════════

    let updateState = 'idle'; // idle | available | downloading | downloaded

    // Very small markdown-ish formatter so GitHub release notes
    // (which are markdown) read reasonably instead of as raw text.
    function formatReleaseNotes(raw) {
      if (!raw) return '<p>No details were provided for this update.</p>';
      let html = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Bullet lines starting with - or *
      const lines = html.split('\n');
      let out = '';
      let inList = false;
      for (const line of lines) {
        const bullet = line.match(/^\s*[-*]\s+(.*)/);
        if (bullet) {
          if (!inList) { out += '<ul>'; inList = true; }
          out += `<li>${bullet[1]}</li>`;
        } else {
          if (inList) { out += '</ul>'; inList = false; }
          if (line.trim()) out += `<p>${line.trim()}</p>`;
        }
      }
      if (inList) out += '</ul>';
      return out || '<p>No details were provided for this update.</p>';
    }

    function showUpdateAvailable(info) {
      updateState = 'available';
      document.getElementById('updateTitle').textContent = 'Update available';
      document.getElementById('updateVersionLabel').textContent = `Flamby v${info.version}`;
      document.getElementById('updateNotes').innerHTML = formatReleaseNotes(info.releaseNotes);

      document.getElementById('updateProgressTrack').style.display = 'none';
      document.getElementById('updateProgressLabel').style.display = 'none';
      document.getElementById('updateButtons').style.display = 'flex';

      const actionBtn = document.getElementById('updateActionBtn');
      actionBtn.textContent = 'Update now';
      actionBtn.disabled = false;

      document.getElementById('updateToast').classList.add('show');
    }

    function showUpdateDownloading() {
      updateState = 'downloading';
      document.getElementById('updateTitle').textContent = 'Downloading update…';
      document.getElementById('updateProgressTrack').style.display = 'block';
      document.getElementById('updateProgressLabel').style.display = 'block';

      const actionBtn = document.getElementById('updateActionBtn');
      actionBtn.textContent = 'Downloading…';
      actionBtn.disabled = true;
    }

    function showUpdateDownloaded() {
      updateState = 'downloaded';
      document.getElementById('updateTitle').textContent = 'Update ready';
      document.getElementById('updateProgressLabel').textContent = 'Downloaded — restart to install';

      const actionBtn = document.getElementById('updateActionBtn');
      actionBtn.textContent = 'Restart now';
      actionBtn.disabled = false;
    }

    function dismissUpdateToast() {
      document.getElementById('updateToast').classList.remove('show');
    }

    async function handleUpdateAction() {
      if (updateState === 'available') {
        showUpdateDownloading();
        await window.electronAPI.downloadUpdate();
      } else if (updateState === 'downloaded') {
        await window.electronAPI.installUpdate();
      }
    }

    window.electronAPI.onUpdateAvailable((info) => {
      showUpdateAvailable(info);
    });

    window.electronAPI.onUpdateProgress((progress) => {
      const pct = Math.round(progress.percent || 0);
      document.getElementById('updateProgressFill').style.width = pct + '%';
      document.getElementById('updateProgressLabel').textContent = `${pct}% downloaded`;
    });

    window.electronAPI.onUpdateDownloaded(() => {
      showUpdateDownloaded();
    });

    window.electronAPI.onUpdateError((err) => {
      // Quietly drop it — most "errors" here are just "no update found" /
      // network blips, and we don't want to nag the user with a popup for that.
      console.warn('Update check issue:', err && err.message);
    });

    // ═══════════════════════════════════════════════════════
    // FULLSCREEN  (F11)
    // ═══════════════════════════════════════════════════════
    const tabBar  = document.querySelector('.tab-bar');
    const toolbar = document.querySelector('.toolbar');

    window.electronAPI.onFullscreenChange((isFullscreen) => {
      document.body.classList.toggle('is-fullscreen', isFullscreen);
      [tabBar, toolbar].forEach(el => { if (el) el.classList.toggle('fs-hidden', isFullscreen); });
    });

    // Move mouse to very top to reveal tab bar + toolbar while in fullscreen
    document.addEventListener('mousemove', (e) => {
      if (!document.body.classList.contains('is-fullscreen')) return;
      const show = e.clientY <= 3;
      const hide = e.clientY > 90;
      if (show)      [tabBar, toolbar].forEach(el => el && el.classList.remove('fs-hidden'));
      else if (hide) [tabBar, toolbar].forEach(el => el && el.classList.add('fs-hidden'));
    });

    // ═══════════════════════════════════════════════════════
    // DEVTOOLS  (F12 — OS window repositioned to bottom)
    // ═══════════════════════════════════════════════════════
    let devtoolsOpen = false;
    const devtoolsBar = document.getElementById('devtoolsBar');

    function openDevtoolsPane() {
      const wv = getActiveWebview();
      if (!wv) return;
      window.electronAPI.openDockedDevTools(wv.getWebContentsId());
      if (devtoolsBar) devtoolsBar.classList.add('visible');
      devtoolsOpen = true;
    }

    function closeDevtoolsPane() {
      window.electronAPI.closeDockedDevTools();
      if (devtoolsBar) devtoolsBar.classList.remove('visible');
      devtoolsOpen = false;
    }

    window.electronAPI.onDevToolsToggle(() => {
      devtoolsOpen ? closeDevtoolsPane() : openDevtoolsPane();
    });

    window.electronAPI.onDevToolsClosed(() => {
      if (devtoolsBar) devtoolsBar.classList.remove('visible');
      devtoolsOpen = false;
    });

    // PiP shortcut from inside webview (Alt+P while focused on a page)
    window.electronAPI.onPiPToggle(() => togglePiP());

    // ═══════════════════════════════════════════════════════
    // FIRST-LAUNCH ONBOARDING
    // ═══════════════════════════════════════════════════════
    let onboardingStep = 0;

    const ONBOARDING_STEPS = [
      // Step 0 — Welcome
      {
        title: 'Welcome to Flamby 🔥',
        body: [
          'A fast, privacy-focused browser built around vertical tabs, split view, and a look that\'s entirely yours.',
          'Let\'s get you set up — it only takes a moment.'
        ],
        primary: 'Get Started',
        render(right) {
          right.innerHTML = `
            <div class="onboarding-final">
              <img src="img/flamby-logo.png" alt="Flamby" />
            </div>`;
        }
      },
      // Step 1 — Search engine
      {
        title: 'Your Default Search Engine',
        body: ['Choose what powers your address bar. You can always change this later in Settings.'],
        primary: 'Next',
        render(right) {
          const engines = [
            { id: 'google', label: 'Google', icon: '<svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.14c-.22-.69-.35-1.42-.35-2.14s.13-1.45.35-2.14V7.02H2.18A10.97 10.97 0 001 12c0 1.77.43 3.45 1.18 4.98z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.02l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>' },
            { id: 'bing', label: 'Bing', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5eb3ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v15l4 2.2 6-3.6-6-2.6V5z"/></svg>' },
            { id: 'duckduckgo', label: 'DuckDuckGo', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff9d4d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="11" r="3"/></svg>' },
          ];
          right.innerHTML = `<div class="onboarding-grid" id="onbSearchGrid"></div>`;
          const grid = right.querySelector('#onbSearchGrid');
          engines.forEach(e => {
            const card = document.createElement('div');
            card.className = 'onboarding-choice-card' + (currentSettings.searchEngine === e.id ? ' active' : '');
            card.id = 'onb-search-' + e.id;
            card.innerHTML = `<div class="icon-circle">${e.icon}</div><span>${e.label}</span>`;
            card.onclick = () => {
              setSearch(e.id);
              grid.querySelectorAll('.onboarding-choice-card').forEach(c => c.classList.remove('active'));
              card.classList.add('active');
            };
            grid.appendChild(card);
          });
        }
      },
      // Step 2 — Theme
      {
        title: 'Make Flamby Yours',
        body: ['Pick a color theme to start with — fine-tune it anytime from Settings, including a fully custom color.'],
        primary: 'Next',
        render(right) {
          const themes = ['dark','light','purple','ocean','brown','gray','white','black','red','green','pink'];
          const gradients = {
            dark:'linear-gradient(135deg,#2b1055,#4d1d75,#1a3a6b)', light:'linear-gradient(135deg,#a8c8ff,#c9b6f5,#f5c6e0)',
            purple:'linear-gradient(135deg,#1a0a2e,#3d1466,#1a0a2e)', ocean:'linear-gradient(135deg,#001e3c,#003e5c,#001e3c)',
            brown:'linear-gradient(135deg,#3e2723,#5d4037,#4e342e)', gray:'linear-gradient(135deg,#4a4a4a,#6b6b6b,#3d3d3d)',
            white:'linear-gradient(135deg,#f5f5f7,#e8e8ec,#fafafa)', black:'linear-gradient(135deg,#050505,#1a1a1a,#000000)',
            red:'linear-gradient(135deg,#4a0e0e,#7a1f1f,#2e0707)', green:'linear-gradient(135deg,#0d2818,#1e4d33,#0a1f12)',
            pink:'linear-gradient(135deg,#d68fb0,#f0b8d0,#e89dc0)'
          };
          right.innerHTML = `<div class="onboarding-theme-grid" id="onbThemeGrid"></div>`;
          const grid = right.querySelector('#onbThemeGrid');
          themes.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'theme-swatch' + (currentSettings.theme === t ? ' active' : '');
            btn.style.background = gradients[t];
            btn.title = t.charAt(0).toUpperCase() + t.slice(1);
            btn.onclick = () => {
              setTheme(t);
              grid.querySelectorAll('.theme-swatch').forEach(c => c.classList.remove('active'));
              btn.classList.add('active');
            };
            grid.appendChild(btn);
          });
        }
      },
      // Step 3 — Feature toggles
      {
        title: 'Browse Your Way',
        body: ['Turn on the features you want from the start. Everything here can be changed later in Settings too.'],
        primary: 'Next',
        render(right) {
          right.innerHTML = `
            <div class="onboarding-toggles">
              <div class="onboarding-toggle-row">
                <div class="label"><span>Vertical Tabs</span><span>Show tabs in a collapsible side rail</span></div>
                <label class="toggle">
                  <input type="checkbox" id="onbVerticalTabs" ${currentSettings.tabLayout === 'vertical' ? 'checked' : ''}/>
                  <span class="slider"></span>
                </label>
              </div>
              <div class="onboarding-toggle-row">
                <div class="label"><span>Block Ads &amp; Trackers</span><span>Faster pages, fewer distractions</span></div>
                <label class="toggle toggle-green">
                  <input type="checkbox" id="onbAdblock" ${currentSettings.adblockEnabled !== false ? 'checked' : ''}/>
                  <span class="slider"></span>
                </label>
              </div>
              <div class="onboarding-toggle-row">
                <div class="label"><span>Open New Tabs as Private</span><span>Nothing saved to history by default</span></div>
                <label class="toggle toggle-purple">
                  <input type="checkbox" id="onbPrivate" ${currentSettings.privateModeEnabled ? 'checked' : ''}/>
                  <span class="slider"></span>
                </label>
              </div>
            </div>`;

          right.querySelector('#onbVerticalTabs').onchange = (e) => {
            applyTabLayout(e.target.checked ? 'vertical' : 'horizontal');
            currentSettings.tabLayout = e.target.checked ? 'vertical' : 'horizontal';
            saveSettings();
          };
          right.querySelector('#onbAdblock').onchange = (e) => {
            setAdblockUI(e.target.checked);
            currentSettings.adblockEnabled = e.target.checked;
            saveSettings();
            window.electronAPI.setAdblockEnabled(e.target.checked);
          };
          right.querySelector('#onbPrivate').onchange = (e) => {
            setPrivateUI(e.target.checked);
            currentSettings.privateModeEnabled = e.target.checked;
            saveSettings();
          };
        }
      },
      // Step 4 — Window controls
      {
        title: 'Window Controls',
        body: ['Pick how the minimize, maximize, and close buttons look in your title bar.'],
        primary: 'Next',
        render(right) {
          const styles = ['dots', 'windows', 'macos', 'minimal'];
          const labels = { dots: 'Dots', windows: 'Windows', macos: 'macOS', minimal: 'Minimal' };
          right.innerHTML = `<div class="onboarding-grid" id="onbWcGrid" style="max-width:340px;"></div>`;
          const grid = right.querySelector('#onbWcGrid');
          styles.forEach(s => {
            const card = document.createElement('div');
            card.className = 'onboarding-choice-card' + (currentSettings.windowControlStyle === s ? ' active' : '');
            card.id = 'onb-wc-' + s;
            card.innerHTML = `<div class="wc-preview">${windowControlsMarkup(s, false)}</div><span>${labels[s]}</span>`;
            card.onclick = () => {
              setWindowControlStyle(s);
              grid.querySelectorAll('.onboarding-choice-card').forEach(c => c.classList.remove('active'));
              card.classList.add('active');
            };
            grid.appendChild(card);
          });
        }
      },
      // Step 5 — Done
      {
        title: 'All Set — Let\'s Get Rolling!',
        body: ['You\'re ready to go. Click below to start browsing with Flamby.'],
        primary: 'Dive in!',
        render(right) {
          right.innerHTML = `<div class="onboarding-final"><img src="img/flamby-logo.png" alt="Flamby" /></div>`;
        }
      },
    ];

    async function maybeShowOnboarding() {
      try {
        const should = await window.electronAPI.shouldShowOnboarding();
        if (should) {
          onboardingStep = 0;
          renderOnboardingProgress();
          renderOnboardingStep();
          document.getElementById('onboardingOverlay').classList.add('show');
        }
      } catch (e) {
        console.error('Onboarding check failed:', e);
      }
    }

    function renderOnboardingProgress() {
      const track = document.getElementById('onboardingProgress');
      track.innerHTML = ONBOARDING_STEPS.map((_, i) => {
        const cls = i < onboardingStep ? 'done' : (i === onboardingStep ? 'active' : '');
        return `<div class="seg ${cls}"><div class="seg-fill"></div></div>`;
      }).join('');
    }

    function renderOnboardingStep() {
      const step = ONBOARDING_STEPS[onboardingStep];
      const textEl = document.getElementById('onboardingText');
      textEl.innerHTML = `<h2>${step.title}</h2>` + step.body.map(p => `<p>${p}</p>`).join('');
      document.getElementById('onboardingPrimaryBtn').textContent = step.primary;
      document.getElementById('onboardingSkipBtn').style.display =
        onboardingStep === ONBOARDING_STEPS.length - 1 ? 'none' : 'block';
      step.render(document.getElementById('onboardingRight'));
      renderOnboardingProgress();
    }

    function onboardingNext() {
      if (onboardingStep >= ONBOARDING_STEPS.length - 1) {
        finishOnboarding();
        return;
      }
      onboardingStep++;
      renderOnboardingStep();
    }

    function onboardingSkip() {
      finishOnboarding();
    }

    async function finishOnboarding() {
      document.getElementById('onboardingOverlay').classList.remove('show');
      try {
        await window.electronAPI.completeOnboarding();
      } catch (e) {
        console.error('Failed to persist onboarding completion:', e);
      }
    }


    async function init() {
  // Load settings first so homepage is correct before opening tab
  await loadSettings();
  // Then load bookmarks
  await loadBookmarks();
  // Then open the first tab with the correct homepage
  addTab(homepage === 'newtab.html' ? homepage : homepage);
  // Load any in-progress / past downloads
  refreshDownloadsList();
  // First-launch intro (only shows once, ever, per profile)
  maybeShowOnboarding();
}


    init();
  </script>
</body>
</html>
